name: collision-control
kind: review_profile
primary_gate: false
composition: control
min_reviewers: 2
max_reviewers: 2
reviewer_role_contracts:
  - generalist
context_policy:
  start_mode: fresh_context
  fork_conversation_context: false
prompt_policy:
  focused_packet_only: true
  include_collision_batch_id: true
  include_disputed_findings: true
  include_orchestrator_collision_reason: true
  include_referenced_artifacts: true
purpose: Exception profile for a per-cycle rejected or downgraded blocker collision batch. This is not a primary review gate.
trigger: rejected_or_downgraded_blocker_collision
use_when:
  - one or more blocker-level candidate findings were rejected or downgraded by the main/orchestrating agent in the same review cycle
  - the workflow needs two fresh-context control reviewers focused on the collision batch
