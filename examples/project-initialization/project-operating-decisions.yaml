version: 1

source:
  collection_mode: agent-led-dialogue
  interviewer: main-agent
  based_on_artifacts:
    - project-intake.yaml
    - project-raw-scan.json
    - project-inventory.json
    - project-assessment.json
  raw_dialogue_reference: initialization-chat

interview_state:
  status: confirmed
  confirmed_by: project-owner
  confirmation_summary: "Use a lightweight default workflow with pytest as the mandatory verification gate and two read-only reviewers; use two control reviewers for each per-cycle batch of disputed rejected or downgraded blockers."

project_context:
  project_owner: project-owner
  project_domain:
    value: small Python library/tooling project
    status: confirmed
  user_domain_expertise:
    value: project owner is authoritative for local project intent
    status: confirmed
  project_risk_level:
    value: normal
    status: confirmed

workflow_defaults:
  default_workflow:
    value: big-feature-contract-first
    status: confirmed
  low_risk_strictness:
    value: L1
    status: confirmed
  normal_strictness:
    value: L2
    status: confirmed
  high_risk_strictness:
    value: L3
    status: confirmed
  default_review_topology:
    value: homogeneous-dual
    status: confirmed

verification_gate_policy:
  mandatory_blockers:
    - tests
  advisory_checks:
    - lint
    - typecheck
  canonical_commands:
    test: "PYTHONPATH=src python3 -m pytest tests"
    lint: null
    typecheck: null
    security: null
    performance: null
    domain_specific: []
  red_green_required_for_implementation: true
  evidence_required:
    - command
    - exit_code
    - output_summary
    - artifact_path
  unresolved_items: []

review_policy:
  reviewer_count: 2
  composition: homogeneous
  prompt_policy:
    same_prompt: true
    same_packet: true
    same_rubric: true
    same_output_schema: true
  reviewer_roles:
    - generalist
  context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
      - review_packet
      - referenced_artifacts
  read_only_by_default: true
  review_after_green_gate: true
  allow_external_reviewers: false
  preferred_external_provider: null
  allow_different_models: false
  candidate_findings_require_main_validation: true
  external_reviewer_context_policy:
    full_repo_access: false
    packet_only: true
    raw_logs_allowed: false

review_cycle_policy:
  control_reviewer_count: 2
  control_review_trigger: rejected_or_downgraded_blocker_collision
  control_review_purpose: Check a per-cycle batch of disputed blocker-level findings after the main agent rejects or downgrades them.
  control_review_context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
      - disputed_blocker_findings
      - orchestrator_collision_reason
      - referenced_artifacts
  rerun_review_on:
    - project_overlay_materially_changed
    - mandatory_evidence_added
    - human_requested
  do_not_rerun_on:
    - nonblocking_findings_with_non_material_fixes_only
    - irrelevant_findings_rejected_with_reason
  materiality_classification:
    required_after_review_fixes: true
    material_triggers_take_precedence_over_do_not_rerun: true
    material_if_changes:
      - project_overlay_or_binding
      - workflow_or_gate_policy
      - review_cycle_policy
      - schema_or_validator
      - mandatory_evidence
      - verification_gate_output
      - examples_used_as_evidence
    non_material_if_only:
      - report_editorial_changes_only
      - duplicate_consolidation
      - non_source_of_truth_notes
  escalate_to_human_on:
    - validated_blocking_finding_disputed
    - gate_override_requested
    - max_review_cycles_exceeded

authority_policy:
  approve_scope_changes: project-owner
  approve_gate_policy_changes: project-owner
  approve_review_topology_changes: project-owner
  accept_residual_risk: project-owner
  approve_legacy_migration: project-owner
  override_blocking_gate: project-owner

artifact_policy:
  runs_root: Docs/agentsflow/runs/
  evidence_root: Docs/agentsflow/evidence/
  commit_reports: true
  store_raw_logs: optional
  redact_sensitive_evidence: true
  external_reviewer_sensitive_evidence: forbidden-unless-approved

decision_log:
  - id: verification.mandatory_blockers
    question: Which checks must block acceptance?
    answer:
      - tests
    status: confirmed
    source: human-dialogue
  - id: verification.canonical_test_command
    question: What is the canonical test command?
    answer: "PYTHONPATH=src python3 -m pytest tests"
    status: confirmed
    source: human-dialogue
  - id: review.reviewer_count
    question: How many read-only reviewers are required by default?
    answer: 2
    status: confirmed
    source: human-dialogue
  - id: review.composition
    question: What is the default review composition?
    answer: "homogeneous-dual: two generalist reviewers with the same prompt, packet, rubric and output schema."
    status: confirmed
    source: human-dialogue
  - id: review_cycle.control_reviewers
    question: How many control reviewers are required for a blocker-level collision batch?
    answer: "Two fresh-context control reviewers review one per-cycle batch after blocker-level findings are rejected or downgraded by the main/orchestrating agent."
    status: confirmed
    source: human-dialogue
  - id: review.context_policy
    question: Should reviewers inherit the main agent conversation context?
    answer: "No. Reviewers start from fresh zero context and receive only the review packet and referenced artifacts."
    status: confirmed
    source: human-dialogue
  - id: review.allow_different_models
    question: Should review use different models or harnesses when available?
    answer: false
    status: confirmed
    source: human-dialogue
  - id: review_cycle.max_review_cycles
    question: Should review cycles have a numeric cap before escalation?
    answer: "No default cap. If the project sets max_review_cycles, it must be at least 3; if omitted, review cycles are not limited by count."
    status: confirmed
    source: human-dialogue

unresolved_questions: []
