extends: .agentsflow/upstream/gates/verification_gate.yaml
runner: .agentsflow/scripts/run_verification_gate.sh
instruments:
  - id: unit_tests
    type: tests
    command: PYTHONPATH=src python3 -m pytest tests
  - id: behavior_binding_check
    type: deterministic_script
    command: python3 .agentsflow/upstream/scripts/bdd_binding_check.py --bindings Docs/agentsflow/runs/2026-06-17-add-calculator/behavior.bindings.yaml
outputs:
  - Docs/agentsflow/runs/2026-06-17-add-calculator/verification-gate-report.md
  - Docs/agentsflow/runs/2026-06-17-add-calculator/evidence-report.md
