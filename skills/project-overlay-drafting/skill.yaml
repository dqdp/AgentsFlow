name: project-overlay-drafting
type: skill
version: 0.1
purpose: "Draft a project overlay, workflow bindings and project-bound gates from confirmed inventory and assessment outputs."
inputs:
  - project_intake
  - raw_scan
  - selected_docs
  - human_context
outputs:
  - project_overlay_draft
  - workflow_bindings
  - project_bound_gates
depends_on: []
compatible_workflows:
  - project-initialization
quality_bar:
  - Observed facts and inferred judgments are separated.
  - Non-trivial inferred fields include evidence, confidence and human-confirmation markers.
anti_patterns:
  - Treating model inferences as deterministic facts.
  - Ignoring project documentation or Markdown implementation history.
