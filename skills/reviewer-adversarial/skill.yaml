name: reviewer-adversarial
type: skill
version: 0.1
purpose: Look for scope creep, prompt/policy bypasses, hidden failure modes, and false
  completion.
inputs:
- contract
- artifact
- evidence_report
- domain_pack
outputs:
- adversarial_review_report
- risk_notes
depends_on: []
compatible_workflows:
- agentic-system-hardening
- prompt-behavior-eval
- review-only-fusion
quality_bar:
- Findings are plausible and testable.
- Speculative concerns are labeled as such.
anti_patterns:
- Blocking on vague suspicion without a concrete failure mode.
mode: read_only
actor_class: review_agent
runs_after:
- verification_gate
forbidden_actions:
- run_tests
- run_scripts
- modify_files
- generate_patch
finding_lifecycle:
  initial_status: candidate-unvalidated
  requires_relevance_validation_by: main_orchestrating_agent
  allowed_validation_statuses:
  - accepted-relevant
  - rejected-irrelevant
  - needs-more-evidence
  - duplicate
  - human-decision-required
default_permissions:
  read: true
  write: false
  run_tests: false
  run_verification_instruments: false
  run_tools: false
tool_exceptions_allowed: true
tool_exceptions: []
