name: fusion-synthesis
type: skill
version: 0.1
purpose: Synthesize independent reviewer reports into consensus, disagreements, blockers,
  and final verdict.
inputs:
- contract
- review_reports
- evidence_report
- risk_surface_profile
- failure_path_matrix
- evidence_freshness
outputs:
- mechanical_intake_summary
- canonical_finding_groups
- fusion_report
- final_verdict
- human_decision_items
depends_on: []
compatible_workflows:
- big-feature-contract-first
- agentic-system-hardening
- review-only-fusion
- pr-merge-readiness
quality_bar:
- No plausible blocker is hidden by majority vote.
- Disagreements are preserved.
- FPM coverage and freshness gaps are preserved as candidate evidence issues.
- Duplicate, related, and conflict groups preserve source findings and max candidate severity until relevance validation.
- Human-mediated decisions remain human-owned; fusion provides decision support only.
anti_patterns:
- Averaging away blocking issues.
- Reclassifying missing selected risk-path evidence as nonblocking without relevance validation.
actor_class: fusion_agent
mode: read_only
runs_after:
- verification_gate
- review
forbidden_actions:
- run_tests
- run_scripts
- modify_files
- generate_patch
role: read_only_synthesis
may_launch_reviewers: false
may_run_gates: false
may_request_additional_review: true
