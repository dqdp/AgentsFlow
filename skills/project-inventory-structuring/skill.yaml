name: project-inventory-structuring
type: skill
version: 0.1
purpose: "Fill a structured project inventory from raw scan evidence and selected documentation while separating observed facts from model-inferred fields."
inputs:
  - project_intake
  - raw_scan
  - selected_docs
  - human_context
outputs:
  - project_inventory_json
  - unknowns
  - human_questions
depends_on: []
compatible_workflows:
  - project-initialization
quality_bar:
  - Observed facts and inferred judgments are separated.
  - Non-trivial inferred fields include evidence, confidence and human-confirmation markers.
anti_patterns:
  - Treating model inferences as deterministic facts.
  - Ignoring project documentation or Markdown implementation history.
