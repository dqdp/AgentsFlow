id: adr_candidate_gate
name: ADR Candidate Gate
kind: gate
purpose: Validate that candidate ADRs include context, options, decision criteria,
  evidence and consequences.
runner: scripts/gates/run_gate.py
may_modify_files: false
inputs:
- ADR candidate drafts
- decision-contract.md
instruments:
- id: decision_contract_lint
  type: schema_validation
  required: true
checks:
- decision_contract_lint
bdd_bindings: []
required_evidence:
- ADR candidate completeness
outputs:
- adr-candidate-gate-report.md
- adr-candidate-gate-report.json
result_states:
- pass
- pass_with_notes
- fail
- inconclusive
- needs_human_decision
- blocked
pass_policy:
  required_instruments:
  - decision_contract_lint
  fail_on:
  - missing_required_instrument
  - nonzero_required_check
  - missing_required_evidence
  inconclusive_on:
  - missing_optional_tool
  - flaky_result
  - insufficient_observability
  needs_human_decision_on:
  - manual_evidence_required
  - policy_override_required
binding_level: upstream_gate_contract
requires_project_binding: true
runner_interface: deterministic_runner_entrypoint
project_binding_required_for_real_run: true
