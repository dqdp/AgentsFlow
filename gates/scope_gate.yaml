id: scope_gate
name: Scope Gate
kind: gate
purpose: Validate that scope, boundaries, non-goals, target system and enabling system
  assumptions are explicit.
runner: scripts/gates/run_gate.py
may_modify_files: false
inputs:
- scope section
- target-system-spec.md
- enabling-system-spec.md
instruments:
- id: scope_lint
  type: schema_validation
  required: true
checks:
- scope_lint
bdd_bindings: []
required_evidence:
- scope completeness
outputs:
- scope-gate-report.md
- scope-gate-report.json
result_states:
- pass
- pass_with_notes
- fail
- inconclusive
- needs_human_decision
- blocked
pass_policy:
  required_instruments:
  - scope_lint
  fail_on:
  - missing_required_instrument
  - nonzero_required_check
  - missing_required_evidence
  inconclusive_on:
  - missing_optional_tool
  - flaky_result
  - insufficient_observability
  needs_human_decision_on:
  - manual_evidence_required
  - policy_override_required
binding_level: upstream_gate_contract
requires_project_binding: true
runner_interface: deterministic_runner_entrypoint
project_binding_required_for_real_run: true
