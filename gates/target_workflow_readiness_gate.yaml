id: target_workflow_readiness_gate
name: Target Workflow Readiness Gate
kind: gate
purpose: Validate that prepare-workflow mode has a declared target workflow and
  enough project-bound operating context to prepare that workflow, or has captured
  bounded target-workflow open decisions as human-mediated evidence.
open_decision_packet:
  packet_kind: target_workflow_open_decisions
  discovered_by: target_workflow_readiness_preflight
  owning_requirement_ref_required: true
  allowed_decision_scopes:
  - run_scoped
  - persistent_policy_candidate
  required_fields:
  - decision_id
  - owning_requirement_ref
  - decision_scope
  - classification
  - status
  - affected_artifacts
  - rationale
  deferral_requires:
  - deferral_constraints
  - residual_risk
  persistent_policy_activation_allowed: false
runner: scripts/gates/run_gate.py
may_modify_files: false
inputs:
- project-intake.yaml
- project-inventory.json
- project-assessment.json
- project-documentation-disposition.yaml
- project-knowledge-extraction.md when documentation_legacy_adoption.mode is knowledge-extraction
- existing project policy/workflow binding evidence when available
- target workflow preflight findings when available
- human decision packet when operating context is incomplete or bounded target-workflow open decisions are discovered
- human risk acceptance evidence when documentation_legacy_adoption.extraction_depth is light
- extraction depth upgrade evidence when documentation_legacy_adoption.extraction_depth is light
instruments:
- id: validate_project_intake
  type: deterministic_script
  command: python scripts/validate_project_intake.py
  required: true
- id: operating_context_manual_check
  type: manual_evidence_check
  required: true
checks:
- validate_project_intake
- operating_context_manual_check
bdd_bindings: []
required_evidence:
- project intake validation result
- declared target_workflow for prepare-workflow
- project-documentation-disposition.yaml as run-level target workflow context
- project-knowledge-extraction.md as run-level target workflow context when documentation_legacy_adoption.mode is knowledge-extraction
- existing project policy/workflow binding evidence or target workflow preflight findings
- bounded target-workflow open decision evidence or human decision packet, with owning requirement references
- target workflow risk-surface decision evidence with owning requirement references
- target workflow Failure Path Matrix decision evidence with owning requirement references
- human risk acceptance evidence when documentation_legacy_adoption.extraction_depth is light, or evidence that extraction_depth was upgraded to standard or deep
outputs:
- target-workflow-readiness-gate-report.md
- target-workflow-readiness-gate-report.json
result_states:
- pass
- pass_with_notes
- fail
- inconclusive
- needs_human_decision
- blocked
pass_policy:
  required_instruments:
  - validate_project_intake
  - operating_context_manual_check
  fail_on:
  - missing_required_instrument
  - nonzero_required_check
  - missing_required_evidence
  inconclusive_on:
  - insufficient_operating_context
  - missing_optional_tool
  needs_human_decision_on:
  - missing_gate_policy
  - missing_review_policy
  - missing_evidence_location
  - missing_risk_surface_policy
  - missing_failure_path_matrix_policy
  - missing_authority_boundary
  - missing_light_extraction_risk_acceptance
  - unresolved_material_design_decision
binding_level: upstream_gate_contract
requires_project_binding: true
runner_interface: deterministic_runner_entrypoint
project_binding_required_for_real_run: true
