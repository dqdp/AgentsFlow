id: contract_gate
name: Contract Gate
kind: gate
purpose: Validate that the task/spec contract is structurally complete and that BDD
  scenarios are syntactically usable.
runner: scripts/gates/run_gate.py
may_modify_files: false
inputs:
- task.contract.md
- workflow.yaml
instruments:
- id: contract_lint
  type: deterministic_script
  command: python scripts/contract_lint.py
  required: true
- id: gherkin_lint
  type: deterministic_script
  command: python scripts/gherkin_lint.py
  required: true
checks:
- contract_lint
- gherkin_lint
bdd_bindings: []
required_evidence:
- contract lint result
- gherkin lint result
outputs:
- contract-gate-report.md
- contract-gate-report.json
result_states:
- pass
- pass_with_notes
- fail
- inconclusive
- needs_human_decision
- blocked
pass_policy:
  required_instruments:
  - contract_lint
  - gherkin_lint
  fail_on:
  - missing_required_instrument
  - nonzero_required_check
  - missing_required_evidence
  inconclusive_on:
  - missing_optional_tool
  - flaky_result
  - insufficient_observability
  needs_human_decision_on:
  - manual_evidence_required
  - policy_override_required
binding_level: upstream_gate_contract
requires_project_binding: true
runner_interface: deterministic_runner_entrypoint
project_binding_required_for_real_run: true
