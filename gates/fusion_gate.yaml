id: fusion_gate
name: Fusion Gate
kind: gate
purpose: Check that review/fusion protocol artifacts exist and that validated blockers
  are preserved.
runner: scripts/gates/run_gate.py
may_modify_files: false
inputs:
- reviewer reports
- finding-validation-report.md
- fusion-report.md
instruments:
- id: review_protocol_check
  type: review_protocol_check
  required: true
- id: fusion_protocol_check
  type: fusion_protocol_check
  required: true
checks:
- review_protocol_check
- fusion_protocol_check
bdd_bindings: []
required_evidence:
- review protocol result
- fusion protocol result
outputs:
- fusion-gate-report.md
- fusion-gate-report.json
result_states:
- pass
- pass_with_notes
- fail
- inconclusive
- needs_human_decision
- blocked
pass_policy:
  required_instruments:
  - review_protocol_check
  - fusion_protocol_check
  fail_on:
  - missing_required_instrument
  - nonzero_required_check
  - missing_required_evidence
  inconclusive_on:
  - missing_optional_tool
  - flaky_result
  - insufficient_observability
  needs_human_decision_on:
  - manual_evidence_required
  - policy_override_required
binding_level: upstream_gate_contract
requires_project_binding: true
runner_interface: deterministic_runner_entrypoint
project_binding_required_for_real_run: true
