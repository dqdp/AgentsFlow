id: regression_gate
name: Regression Gate
kind: gate
purpose: Validate that a bugfix has a reproduction or regression scenario and that
  the expected/unchanged behavior is explicit.
runner: scripts/gates/run_gate.py
may_modify_files: false
inputs:
- bugfix spec or task contract
- regression test/scenario
- verification evidence
instruments:
- id: contract_lint
  type: deterministic_script
  command: python scripts/contract_lint.py
  required: true
- id: bdd_or_regression_binding
  type: bdd_runner
  command: workflow/profile defined
  required: true
checks:
- contract_lint
- bdd_or_regression_binding
bdd_bindings: []
required_evidence:
- regression scenario binding
- regression result
outputs:
- regression-gate-report.md
- regression-gate-report.json
result_states:
- pass
- pass_with_notes
- fail
- inconclusive
- needs_human_decision
- blocked
pass_policy:
  required_instruments:
  - contract_lint
  - bdd_or_regression_binding
  fail_on:
  - missing_required_instrument
  - nonzero_required_check
  - missing_required_evidence
  inconclusive_on:
  - missing_optional_tool
  - flaky_result
  - insufficient_observability
  needs_human_decision_on:
  - manual_evidence_required
  - policy_override_required
binding_level: upstream_gate_contract
requires_project_binding: true
runner_interface: deterministic_runner_entrypoint
project_binding_required_for_real_run: true
