version: 1
artifact_kind: review_prompt_contract
artifact_scope: template

identity:
  run_id: YYYY-MM-DD-task-slug
  workflow: big-feature-contract-first
  phase_id: review
  review_profile: homogeneous-dual
  topology: homogeneous-dual
  composition: homogeneous
  effective_strictness: L3
  strictness_source: workflow_default
  primary_gate: true

inputs:
  review_packet_schema: schemas/review-packet.schema.json
  review_packets:
    - reviewer: generalist-a
      path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-packets/generalist-a.json
      schema: schemas/review-packet.schema.json
      packet_hash: sha256:<generalist-a-review-packet>
      shared_packet_content_hash: sha256:<same-shared-review-packet-content>
    - reviewer: generalist-b
      path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-packets/generalist-b.json
      schema: schemas/review-packet.schema.json
      packet_hash: sha256:<generalist-b-review-packet>
      shared_packet_content_hash: sha256:<same-shared-review-packet-content>
  output_schema: schemas/reviewer-report.schema.json
  task_contract: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/task.contract.md
  verification_gate_report: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/verification-gate-report.md
  evidence_report: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/evidence-report.md
  artifact_preparation_report: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/prepared-review-artifacts.json
  review_invocation_set: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-invocation-set.json
  external_reviewer_preflight: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/external-reviewer-preflight.json

reviewer_set:
  - instance_id: generalist-a
    role_id: generalist
    role_contract: profiles/reviewer_roles/generalist.yaml
    independent: true
  - instance_id: generalist-b
    role_id: generalist
    role_contract: profiles/reviewer_roles/generalist.yaml
    independent: true

provider_policy:
  allow_external_reviewers: false
  require_model_diversity: false
  min_distinct_provider_model_families: 2
  unsupported_provider_behavior: config_blocker

reviewer_assignments:
  - reviewer: generalist-a
    provider: internal-agent
    model_family: codex
    packet_path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-packets/generalist-a.json
    report_path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/reviewer-report.generalist-a.json
  - reviewer: generalist-b
    provider: internal-agent
    model_family: codex
    packet_path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-packets/generalist-b.json
    report_path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/reviewer-report.generalist-b.json

context_policy:
  start_mode: fresh_context
  fork_conversation_context: false
  allowed_context_sources:
    - review_packet
    - referenced_artifacts

permission_policy:
  read_only: true
  forbidden_actions:
    - run_tests
    - run_scripts
    - modify_files
    - create_patch
    - update_evidence
  explicit_tool_exceptions: []

prompt_components:
  shared_base_instructions: templates/review-prompts/base.md
  role_contract_source: profiles/reviewer_roles/generalist.yaml
  focus_supplement_source: null
  finding_lifecycle: candidate-unvalidated
  output_instructions: schemas/reviewer-report.schema.json

prompt_policy:
  same_prompt: true
  same_packet: true
  same_rubric: true
  same_output_schema: true

rendered_prompts:
  - reviewer: generalist-a
    prompt_path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-prompts/generalist-a.md
    prompt_hash: sha256:<same-rendered-prompt>
    shared_prompt_content_hash: sha256:<same-shared-prompt-content>
    packet_hash: sha256:<generalist-a-review-packet>
    shared_packet_content_hash: sha256:<same-shared-review-packet-content>
    schema_hash: sha256:<reviewer-report-schema>
    rubric_hash: sha256:<same-rubric>
    role_contract_hash: sha256:<generalist-role-contract>
  - reviewer: generalist-b
    prompt_path: Docs/agentsflow/runs/YYYY-MM-DD-task-slug/review-prompts/generalist-b.md
    prompt_hash: sha256:<same-rendered-prompt>
    shared_prompt_content_hash: sha256:<same-shared-prompt-content>
    packet_hash: sha256:<generalist-b-review-packet>
    shared_packet_content_hash: sha256:<same-shared-review-packet-content>
    schema_hash: sha256:<reviewer-report-schema>
    rubric_hash: sha256:<same-rubric>
    role_contract_hash: sha256:<generalist-role-contract>

collision_control: null

validation:
  schema: schemas/review-prompt-contract.schema.json
  assembly_invariants:
    - homogeneous-dual uses exactly two reviewers.
    - homogeneous-dual reviewers share prompt content, packet content, rubric, role contract and output schema hashes.
    - reviewer role ids resolve to profiles/reviewer_roles/*.yaml.
    - reviewers start from fresh context and do not receive forked conversation context.
