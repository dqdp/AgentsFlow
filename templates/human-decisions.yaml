version: 1
run_id: "YYYY-MM-DD-task-slug"
artifact_role: run_decision_log

decisions:
  - decision_id: review_policy.model_diversity
    phase_id: operating_decisions_interview
    question_ref: review_policy.model_diversity
    answer: diverse-models
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: "Use model diversity for high-risk reviews."
    affected_artifacts:
      - project-operating-decisions.yaml
      - review-prompt-contract.yaml
  - decision_id: target_workflow.deferred_scope_boundary
    phase_id: target_workflow_context_decision_packet
    question_ref: target_workflow.deferred_scope_boundary
    answer: defer-with-explicit-boundary
    status: explicitly_deferred_with_constraints
    answered_by: human
    classification: blocking-material
    rationale: "The deferred scope is not needed for the current target workflow run."
    deferral_constraints:
      constraints:
        - The target workflow binding must mark the deferred scope out of scope for this run.
        - The readiness gate must not treat the deferred item as implemented or accepted policy.
      owner: human
      review_before: "Before activating persistent project policy."
    affected_artifacts:
      - human-decisions.yaml
      - target workflow binding draft
