name: example-workflow
version: 0.1
intent: "Describe the workflow intent."
default_strictness: L2

supported_profiles:
  strictness:
    - L2
    - L3
  review_topologies:
    - homogeneous-dual

uses:
  skills: []
  scripts: []
  templates: []
  packs: []

actor_model:
  planning:
    mode: human_guided
    coordinator: main-agent
    reserved_optional_actors:
      - planning-agent
  implementation_agent:
    status: reserved_future_actor

verification:
  gate_owns_evidence_production: true
  allowed_instrument_classes:
    - tests
    - deterministic_scripts
    - static_analysis
    - dynamic_analysis
    - debuggers
    - trace_analysis
    - log_analysis
    - network_traffic_analysis
    - profilers
    - fuzzers
    - benchmarks
    - security_scanners
    - domain_tools

review:
  topology: homogeneous-dual
  composition: homogeneous
  control_policy: standard-review-control
  reviewers:
    - generalist-a
    - generalist-b
  prompt_policy:
    same_prompt: true
    same_packet: true
    same_rubric: true
    same_output_schema: true
  context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
      - review_packet
      - referenced_artifacts
  gates:
    - verification_gate
    - evidence_gate
  fusion_required: false

phases:
  - id: specification
    kind: specification
    purpose: "Create or update the contract/specification."
    mode: human_guided
    coordinator: main-agent

  - id: red_capture
    kind: verification
    purpose: "Run the bound checks against the not-yet-implemented state and capture the expected failing result."
    actor_class: verification_gate
    test_framing: red_capture
    owns_evidence_production: true
    gate: verification_gate
    instruments:
      - type: tests
        command: "<test command>"
      - type: deterministic_script
        command: "<script command>"
    outputs:
      - red capture gate report
      - failing-run evidence

  - id: implementation_or_artifact_creation
    kind: implementation
    purpose: "Create the diff or artifact under the workflow's scope."

  - id: verification_gate
    kind: verification
    purpose: "Run workflow-declared verification instruments and evidence validation."
    actor_class: verification_gate
    test_framing: green_verify
    owns_evidence_production: true
    gate: verification_gate
    instruments:
      - type: tests
        command: "<test command>"
      - type: deterministic_script
        command: "<script command>"
    outputs:
      - verification gate report
      - evidence bundle

  - id: review
    kind: review
    purpose: "Run read-only review agents after the verification gate."
    runs_after:
      - verification_gate
    outputs:
      - reviewer reports

  - id: fusion_or_decision
    kind: fusion
    purpose: "Synthesize reviewer reports or make final acceptance decision."
    outputs:
      - fusion report

review_cycle:
  policy: standard-review-control
  default_exit_when: no_validated_blockers_or_mandatory_evidence_gaps
  max_review_cycles_required: false
  max_review_cycles_source: project_policy_or_workflow_binding
  max_review_cycles_absent_means: unlimited
  materiality_classification_source:
    - finding-validation-report.md
    - review-cycle-report.md

exit_criteria:
  - Required gate checks passed or failures are explicitly classified.
  - Review agents consumed gate evidence rather than running checks themselves unless explicitly tool-enabled.
  - Fusion did not orchestrate agents/gates by default.

# Gate phases must reference an executable gate manifest.
# Example:
# phases:
#   - id: verification_gate
#     kind: verification
#     gate: verification_gate
#     outputs:
#       - verification-gate-report.md
#       - evidence-bundle/
