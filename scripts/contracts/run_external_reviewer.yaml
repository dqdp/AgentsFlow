name: run_external_reviewer
type: script
version: 1
entrypoint: scripts/reviewers/run_external_reviewer.py
inputs:
  - provider config
  - review packet
outputs:
  - normalized reviewer report
  - raw provider output
  - invocation metadata
deterministic: false
ci_compatible: false
notes: >
  This script invokes an external model provider in controlled review mode.
  For v0.2, only subscription-local Claude Code CLI is allowed; API-key usage
  is forbidden and must fail fast.
