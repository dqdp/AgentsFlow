name: generate_review_metrics
kind: script_contract
script: scripts/reviewers/generate_review_metrics.py
deterministic: true
purpose: >
  Generate the minimal review-metrics.json artifact from review invocation
  evidence without estimating provider token or cost usage.
inputs:
  review_invocation_set: JSON artifact conforming to schemas/review-invocation-set.schema.json
  run_id: concrete workflow run id
  workflow: workflow name
outputs:
  review_metrics: JSON artifact conforming to schemas/review-metrics.schema.json
guarantees:
  - Separates provider preflight/config blockers from substantive review cycles.
  - Distinguishes wall-clock elapsed time from summed reviewer/provider runtime.
  - Records token/cost usage only when provider-reported values are present.
  - Does not call external providers or inspect live auth state.
