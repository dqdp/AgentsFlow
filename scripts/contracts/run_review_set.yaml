name: run_review_set
type: script
version: 1
entrypoint: scripts/reviewers/run_review_set.py
inputs:
  - review prompt contract with reviewer_assignments
outputs:
  - review invocation set evidence
  - normalized external reviewer reports
  - external raw output and invocation metadata
deterministic: false
ci_compatible: false
notes: >
  This script is a small review-set dispatcher. It verifies internal reviewer
  report artifacts and invokes supported external reviewers through their
  project-bound wrappers. It is not a generic multi-provider runtime.
