risk_surface_profile:
  selected_risk_surfaces:
  - verification_evidence
  - architecture_process
  - adversarial_authority
  - workflow_composition_integrity
  review_topology_source: human_decision
  escalation_reason: PR acceptance rerun after new commit b6662a8; provider-mirrored
    topic-pair review remains required.
  surface_definitions:
    verification_evidence:
      definition: Run-local PR readiness surface for deterministic gate evidence freshness,
        completeness and traceability.
      path_classes:
      - missing_or_stale_required_evidence
      - unstructured_gate_command_evidence
      - green_claim_without_current_material_binding
      catalog_relationship: derived from audit_persistence and persistence_consistency
        for this PR readiness utility run
    architecture_process:
      definition: Run-local PR readiness surface for methodology boundary, self-application
        separation and workflow/source ownership clarity.
      path_classes:
      - methodology_boundary_or_self_application_confusion
      - source_artifact_boundary_confusion
      catalog_relationship: derived from authority_boundary and workflow_composition
        for this PR readiness utility run
    adversarial_authority:
      definition: Run-local PR readiness surface for false readiness, missing human
        approval and mock-vs-live evidence claims.
      path_classes:
      - false_merge_ready_claim_without_human_decision
      - mock_or_placeholder_review_claimed_live
      - publication_claim_without_live_evidence
      catalog_relationship: derived from human_approval, authority_boundary and external_io
        for this PR readiness utility run
    workflow_composition_integrity:
      definition: Project-local surface for duplicated or conflicting workflow policy
        blocks that could change gate semantics.
      path_classes:
      - modularity_drift_or_policy_contradiction
      - repeated_policy_block_conflict
      catalog_relationship: project-local extension declared by the AgentsFlow binding
  calibration_guidance:
  - Do not report missing final_human_merge_decision as a P1 during provider_mirrored_review
    unless the run claims accepted_merge_ready before that decision exists; the final
    human decision is an expected later phase.
  - Do not report gh_pr_view HTTP 401 as a local merge-readiness blocker; it is a
    blocker only for executing optional_github_publication after final local acceptance.
  - Internal-agent reviewer reports are recorded as report-present artifacts with
    reviewer.model=codex; external live evidence requirements apply to claude-code
    assignments.
  - The current run does not rely on its own uncommitted artifacts as source evidence.
    Committed focused-review evidence from the prior material change is provenance
    for b6662a8, while this run rechecks b6662a8 with fresh provider-mirrored review.
