      - task.contract.md
      - plan.md
      - run.yaml
  - decision_id: pr_merge_readiness.ddr_010
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_010
    answer: semantic_requirements_now_exact_fields_through_red_capture_tests
    status: confirmed
    answered_by: human
    classification: nonblocking-follow-up
    rationale: >-
      Human accepted that exact pr-merge-readiness report field names and
      validator strictness are nonblocking implementation details. The semantic
      requirements remain binding, and exact fields must be fixed through
      red-capture tests before implementation.
    affected_artifacts:
      - decision-contract.md
      - task.contract.md
      - behavior.bindings.yaml
      - schemas/pr-merge-readiness-report.schema.json
      - tests/test_pr_merge_readiness.py
  - decision_id: pr_merge_readiness.contract_acceptance
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.contract_acceptance
    answer: accepted_for_red_capture
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted the contract, behavior bindings, Failure Path Matrix,
      impact map, technical plan, target workflow provider-mirrored review
      model, development review scope clarification, allowed boundaries and
      reusable review/fusion authority split for red-capture. This acceptance
      authorizes writing and running red-capture tests only; implementation
      still requires captured failing evidence.
    accepted_decisions:
      - pr_merge_readiness.ddr_001
      - pr_merge_readiness.ddr_002
      - pr_merge_readiness.ddr_003
      - pr_merge_readiness.ddr_004
      - pr_merge_readiness.ddr_005
      - pr_merge_readiness.ddr_006
      - pr_merge_readiness.ddr_007
      - pr_merge_readiness.ddr_008
      - pr_merge_readiness.ddr_008_development_review_scope
      - pr_merge_readiness.development_review_authority_specialist
      - pr_merge_readiness.ddr_008_reusable_fusion_block
      - pr_merge_readiness.ddr_009
      - pr_merge_readiness.ddr_010
    affected_artifacts:
      - run.yaml
      - task.contract.md
      - behavior.bindings.yaml
      - impact-map.yaml
      - repository-grounding-report.md
      - plan.md
      - task-breakdown.md
