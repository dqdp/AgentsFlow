version: 1
run_id: 2026-06-21-pr-merge-readiness
artifact_role: run_decision_log

decisions:
  - decision_id: pr_merge_readiness.identity
    phase_id: operating_context_preflight
    question_ref: pr_merge_readiness.identity
    answer: pr-merge-readiness
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: Use a name that covers both PR readiness and merge acceptance without implying a full release-management runtime.
    affected_artifacts:
      - task.contract.md
      - docs/plans/v0.2-next-slices.md
  - decision_id: pr_merge_readiness.workflow_status
    phase_id: operating_context_preflight
    question_ref: pr_merge_readiness.status
    answer: v0.2 utility workflow
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: Keep v0.2's primary application path narrow while allowing a utility workflow similar in level to review-only-fusion.
    affected_artifacts:
      - task.contract.md
      - workflows/pr-merge-readiness/workflow.yaml
  - decision_id: pr_merge_readiness.implementation_method
    phase_id: operating_context_preflight
    question_ref: pr_merge_readiness.status
    answer: implement-through-big-feature-contract-first
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: Dogfood the existing BFCF methodology while building the utility.
    affected_artifacts:
      - run.yaml
      - task.contract.md
  - decision_id: pr_merge_readiness.first_slice_shape
    phase_id: operating_context_preflight
    question_ref: pr_merge_readiness.status
    answer: docs-schema-template-example-validator
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: The first slice must be executable and validated, not prose-only.
    affected_artifacts:
      - task.contract.md
      - behavior.bindings.yaml
  - decision_id: pr_merge_readiness.live_claude_evidence_policy
    phase_id: operating_context_preflight
    question_ref: pr_merge_readiness.live_claude_evidence
    answer: normalized-report-and-metadata-always-raw-only-when-non-sensitive
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: Preserve review evidence without leaking sensitive local context or confusing mock evidence with live invocation.
    affected_artifacts:
      - task.contract.md
      - .agentsflow/workflows/big-feature-contract-first.binding.yaml
  - decision_id: pr_merge_readiness.self_application_storage_policy
    phase_id: operating_context_preflight
    question_ref: pr_merge_readiness.self_application_storage
    answer: ignored-overlay-single-run-artifacts-root-explicit-promotion-boundary
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: AgentsFlow is both upstream methodology and target project, so artifacts must be role-separated to avoid source/evidence confusion.
    affected_artifacts:
      - run.yaml
      - task.contract.md
      - .gitignore
      - docs/plans/v0.2-next-slices.md
  - decision_id: pr_merge_readiness.review_model
    phase_id: contract
    question_ref: pr_merge_readiness.review_model
    answer: heterogeneous-variable-provider-mirrored-topic-pairs
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: PR merge readiness covers several distinct risk themes, so each theme should be reviewed by both Codex and Claude instead of using one homogeneous generalist pair.
    affected_artifacts:
      - run.yaml
      - task.contract.md
      - plan.md
      - .agentsflow/workflows/big-feature-contract-first.binding.yaml
  - decision_id: pr_merge_readiness.contract_review
    phase_id: contract
    question_ref: pr_merge_readiness.contract_review
    answer: accepted_for_impact_and_technical_planning
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: Human accepted the draft contract and behavior bindings after changing the review model to provider-mirrored heterogeneous topic pairs. Red-capture still requires the later contract_acceptance phase after plan gate readiness.
    affected_artifacts:
      - run.yaml
      - task.contract.md
      - behavior.bindings.yaml
      - impact-map.yaml
      - plan.md
  - decision_id: pr_merge_readiness.bfcf_contract_acceptance_hardening
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.contract_acceptance_process
    answer: harden_bfcf_contract_acceptance_now
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      The current design review exposed a methodology defect: contract
      acceptance must not ask for blanket approval before presenting an open
      decision inventory and per-decision option/tradeoff analysis.
    affected_artifacts:
      - workflows/big-feature-contract-first/workflow.yaml
      - workflows/big-feature-contract-first/README.md
      - skills/decision-contracting/SKILL.md
      - skills/decision-contracting/skill.yaml
      - templates/decision-contract.md
      - docs/workflow-model.md
      - docs/mvp-ready-workflow-standard.md
      - docs/human-interaction-protocol.md
      - scripts/repo_validation/workflows.py
      - tests/test_scripts_smoke.py
    evidence:
      red_capture:
        command: .venv/bin/python -m pytest tests/test_scripts_smoke.py::test_big_feature_requires_contract_acceptance -q
        result: failed_before_validator_and_workflow_update
        observed_failure: contract_acceptance must declare decision_review_contract expectation was not enforced
      green:
        command: .venv/bin/python -m pytest tests/test_scripts_smoke.py::test_big_feature_requires_contract_acceptance -q
        result: passed_after_validator_and_workflow_update
      validation:
        - command: .venv/bin/python scripts/validate_repo.py --root .
          result: passed
        - command: .venv/bin/python -m pytest -q
          result: 148 passed
        - command: make check
          result: passed
        - command: git diff --check
          result: passed
  - decision_id: pr_merge_readiness.ddr_001
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_001
    answer: v0.2_utility_workflow
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted pr-merge-readiness as a v0.2 utility workflow, not a
      primary application workflow and not a release-management workflow.
    affected_artifacts:
      - decision-contract.md
      - task.contract.md
      - workflows/pr-merge-readiness/workflow.yaml
  - decision_id: pr_merge_readiness.ddr_002
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_002
    answer: build_through_big_feature_contract_first_bootstrap
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted building the first pr-merge-readiness slice through the
      existing BFCF workflow. The run remains a bootstrap and must not use the
      unfinished pr-merge-readiness workflow to prove itself ready.
    affected_artifacts:
      - decision-contract.md
      - run.yaml
      - task.contract.md
      - plan.md
  - decision_id: pr_merge_readiness.ddr_003
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_003
    answer: ignored_overlay_run_artifacts_root_explicit_promotion_boundary
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted keeping self-application run evidence separate from both
      methodology source and the ignored local .agentsflow overlay. Durable run
      artifacts stay under run-artifacts/agentsflow/runs, and promoted
      methodology changes require explicit source diffs.
    affected_artifacts:
      - decision-contract.md
      - run.yaml
      - task.contract.md
      - plan.md
      - .gitignore
  - decision_id: pr_merge_readiness.ddr_004
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_004
    answer: workflow_schema_template_example_validator_docs
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted an executable first slice: workflow definition, readiness
      report schema, template, examples, validator coverage and documentation.
      Platform mutation and a full PR/release runtime remain out of scope.
    affected_artifacts:
      - decision-contract.md
      - task.contract.md
      - behavior.bindings.yaml
      - impact-map.yaml
      - plan.md
      - workflows/pr-merge-readiness/workflow.yaml
      - schemas/pr-merge-readiness-report.schema.json
      - templates/pr-merge-readiness-report.*
      - examples/pr-merge-readiness/**
      - docs/pr-merge-readiness.md
      - scripts/repo_validation/**
      - tests/**
  - decision_id: pr_merge_readiness.ddr_005
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_005
    answer: evidence_report_requires_human_merge_decision_for_accepted_status
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted the authority boundary: readiness evidence can be complete,
      but accepted merge readiness requires a recorded human merge decision.
      Green checks or review success alone must not imply approval.
    affected_artifacts:
      - decision-contract.md
      - task.contract.md
      - behavior.bindings.yaml
      - schemas/pr-merge-readiness-report.schema.json
      - templates/pr-merge-readiness-report.*
      - examples/pr-merge-readiness/**
  - decision_id: pr_merge_readiness.ddr_006
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_006
    answer: focused_fpm_drives_tests_and_reviewer_focus_zones
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted a focused Failure Path Matrix for false readiness,
      missing/stale evidence, missing human approval, mock/live confusion,
      raw-output redaction, blocker triage and cyclic self-proof. The FPM also
      drives reviewer specialization by mapping risk surfaces and failure paths
      into review topics and focus zones, while reviewers must still report
      plausible P0/P1 issues outside their focus.
    affected_artifacts:
      - decision-contract.md
      - task.contract.md
      - behavior.bindings.yaml
      - review-prompt-contract artifacts
      - workflows/pr-merge-readiness/workflow.yaml
      - schemas/pr-merge-readiness-report.schema.json
      - examples/pr-merge-readiness/**
  - decision_id: pr_merge_readiness.ddr_007
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_007
    answer: normalized_report_and_invocation_metadata_always_raw_only_when_non_sensitive
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted preserving live Claude auditability through normalized
      reviewer reports and invocation metadata while avoiding default commits of
      sensitive raw provider output. Mock smoke evidence must remain distinct
      from live Claude review evidence.
    affected_artifacts:
      - decision-contract.md
      - task.contract.md
      - behavior.bindings.yaml
      - schemas/pr-merge-readiness-report.schema.json
      - templates/pr-merge-readiness-report.*
      - examples/pr-merge-readiness/**
  - decision_id: pr_merge_readiness.ddr_008
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_008
    answer: heterogeneous_variable_provider_mirrored_topic_pairs
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted a provider-mirrored heterogeneous review gate for future
      pr-merge-readiness runs. Verification/evidence, architecture/process and
      adversarial/authority topics are each reviewed by both Codex and Claude;
      fusion compares provider disagreement within topic pairs and must not use
      majority vote to override P0/P1 candidate blockers. The accepted target
      workflow gate includes mechanical report intake, canonical finding
      extraction, duplicate/related/conflict grouping, topic-pair comparison,
      fusion report, orchestrator relevance validation, collision-control for
      rejected or downgraded P0/P1 candidates, and review-cycle decision.
    affected_artifacts:
      - decision-contract.md
      - run.yaml
      - task.contract.md
      - plan.md
      - review-prompt-contract artifacts
      - workflows/pr-merge-readiness/workflow.yaml
  - decision_id: pr_merge_readiness.ddr_008_development_review_scope
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_008_development_review_scope
    answer: target_six_reviewer_gate_not_used_for_development_run_by_default
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human corrected a scope ambiguity: the six-reviewer provider-mirrored
      topology belongs to future pr-merge-readiness PR/merge readiness runs,
      not to the BFCF development review gate used to build that workflow. The
      current development run uses a separate proportional review gate after
      green verification, with escalation only if evidence or human decision
      requires it.
    affected_artifacts:
      - run.yaml
      - task.contract.md
      - plan.md
      - task-breakdown.md
      - decision-contract.md
      - plan-gate-report.md
      - plan-gate-report.json
      - .agentsflow/workflows/big-feature-contract-first.binding.yaml
  - decision_id: pr_merge_readiness.development_review_authority_specialist
    phase_id: red_capture
    question_ref: pr_merge_readiness.development_review_authority_specialist
    answer: add_codex_adversarial_authority_specialist_to_development_review
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human requested one additional Codex specialist for the riskiest layer of
      the BFCF development review. The development review gate remains separate
      from the target workflow's six-reviewer PR-readiness gate and now uses
      three reviewers: Codex generalist, Claude generalist, and Codex
      adversarial-authority specialist focused on false readiness,
      human-owned decisions, automatic gate versus human-mediated authority,
      mock-vs-live evidence claims and P0/P1 collision-control bypass.
    affected_artifacts:
      - run.yaml
      - task.contract.md
      - plan.md
      - task-breakdown.md
      - decision-contract.md
      - plan-gate-report.md
      - plan-gate-report.json
      - .agentsflow/workflows/big-feature-contract-first.binding.yaml
  - decision_id: pr_merge_readiness.development_review_external_reviewer_blocker_fix
    phase_id: development_review
    question_ref: pr_merge_readiness.development_review_external_reviewer_blocker_fix
    answer: authorize_minimal_external_reviewer_blocker_fix
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human authorized fixing the live Claude review gate after the accepted
      development review attempt exposed provider/wrapper blockers. The
      approved work is limited to preserving subscription-local Claude review,
      enforcing read-only reviewer behavior, binding invocation metadata and
      outputs, adding progress/timeout behavior, normalizing provider output
      into the reviewer-report schema and preparing review artifacts
      deterministically. It does not authorize a new provider, API-key Claude
      usage, write-enabled external reviewers or a generic multi-provider
      runtime.
    affected_artifacts:
      - task.contract.md
      - run.yaml
      - scripts/reviewers/run_external_reviewer.py
      - scripts/reviewers/providers/claude_code.py
      - scripts/reviewers/run_review_set.py
      - scripts/reviewers/prepare_review_set_artifacts.py
      - scripts/reviewers/prompt_rendering.py
      - scripts/reviewers/README.md
      - schemas/reviewer-report.schema.json
      - schemas/reviewer-invocation.schema.json
      - schemas/review-invocation-set.schema.json
      - schemas/external-review-provider.schema.json
      - templates/reviewer-invocation.json
      - templates/external-review-provider.yaml
      - docs/external-reviewer-provider-model.md
      - examples/external-reviewers/claude-code/**
      - examples/e2e/minimal-python-project/Docs/agentsflow/runs/2026-06-17-add-calculator/review-prompt-contract.yaml
      - examples/e2e/minimal-python-project/Docs/agentsflow/runs/2026-06-17-add-calculator/review-prompts/*.md
      - tests/test_scripts_smoke.py
      - run-artifacts/agentsflow/runs/2026-06-21-pr-merge-readiness/**
  - decision_id: pr_merge_readiness.ddr_008_reusable_fusion_block
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_008_reusable_fusion_block
    answer: strengthen_existing_reusable_review_fusion_layer
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted that the post-review fusion and finding-validation
      procedure is a reusable review gate-control block, not a pr-merge-readiness
      local rule. The current slice may minimally harden the existing
      fusion-synthesis skill, review-fusion model and fusion/finding-validation
      templates instead of duplicating the pipeline in each workflow. The block
      must preserve authority boundaries: deterministic automation validates
      structure and evidence, fusion provides decision support, the orchestrator
      validates candidate findings, and human-mediated gates remain human-owned.
    affected_artifacts:
      - docs/review-fusion-model.md
      - skills/fusion-synthesis/SKILL.md
      - skills/fusion-synthesis/skill.yaml
      - templates/fusion-report.md
      - templates/finding-validation-report.md
      - tests/test_scripts_smoke.py
      - decision-contract.md
    evidence:
      red_capture:
        command: .venv/bin/python -m pytest tests/test_scripts_smoke.py::test_review_fusion_reusable_pipeline_is_documented -q
        result: failed_before_shared_review_fusion_layer_update
        observed_failure: mechanical intake and related pipeline terms were not documented in the reusable layer
      green:
        command: .venv/bin/python -m pytest tests/test_scripts_smoke.py::test_review_fusion_reusable_pipeline_is_documented -q
        result: passed_after_shared_review_fusion_layer_update
      validation:
        - command: .venv/bin/python scripts/validate_repo.py --root .
          result: passed
        - command: .venv/bin/python -m pytest -q
          result: 149 passed
        - command: make check
          result: passed
        - command: git diff --check
          result: passed
  - decision_id: pr_merge_readiness.ddr_009
    phase_id: contract_acceptance
    question_ref: pr_merge_readiness.ddr_009
    answer: narrow_slice_boundaries_with_approved_methodology_hardening_exceptions
    status: confirmed
    answered_by: human
    classification: blocking-material
    rationale: >-
      Human accepted the allowed and forbidden change boundaries for the first
