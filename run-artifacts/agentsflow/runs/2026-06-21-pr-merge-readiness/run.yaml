version: 1
run_id: 2026-06-21-pr-merge-readiness
workflow: big-feature-contract-first
agentsflow_version: v0.2.0
binding: .agentsflow/workflows/big-feature-contract-first.binding.yaml
strictness: L3
strictness_source: workflow_default
review_topology: homogeneous-plus-focused
review_composition: two-generalists-plus-focused-specialist
review_model_scope: development_run
status: ready_for_fresh_development_review_rerun

application_mode: self_application_bootstrap
methodology_source: repository_head
methodology_source_commit: 287df5b225867c80f92c9135f1fc85e11617f653
target_project: AgentsFlow
run_artifacts_are_not_methodology_source: true

phase_guard:
  current_phase: development_review
  completed_phases:
    - operating_context_preflight
    - contract
    - impact
    - technical_plan
    - plan_gate
    - contract_acceptance
    - red_capture
    - implementation
    - verification_gate
  allowed_next_phases:
    - development_review
    - fusion
    - finding_validation
  allowed_outputs:
    - human-questions.yaml
    - human-decisions.yaml
    - task.contract.md
    - behavior.bindings.yaml
    - impact-map.yaml
    - repository-grounding-report.md
    - plan.md
    - task-breakdown.md
    - decision-contract.md
    - plan-gate-report.md
    - plan-gate-report.json
    - red-capture-report.md
    - verification-gate-report.md
    - evidence-report.md
    - evidence/red-capture/
  draft_artifacts: []
  forbidden_outputs_until_phase_exit: []
  blocked: false
  blocked_by: []

human_interaction:
  question_artifact: human-questions.yaml
  decision_artifact: human-decisions.yaml
  allowed_statuses:
    - paused_waiting_for_human
    - resumed
    - completed
    - blocked

artifacts:
  root: run-artifacts/agentsflow/runs/2026-06-21-pr-merge-readiness
  human_questions: human-questions.yaml
  human_decisions: human-decisions.yaml
  task_contract: task.contract.md
  behavior_bindings: behavior.bindings.yaml
  impact_map: impact-map.yaml
  repository_grounding_report: repository-grounding-report.md
  plan: plan.md
  task_breakdown: task-breakdown.md
  decision_contract: decision-contract.md
  plan_gate_report: plan-gate-report.md
  plan_gate_report_json: plan-gate-report.json
  red_capture_report: red-capture-report.md
  verification_gate_report: verification-gate-report.md
  evidence_report: evidence-report.md
development_review_model:
  topology: homogeneous-plus-focused
  composition: two-generalists-plus-focused-specialist
  provider_strategy: mixed-provider-generalists-plus-codex-specialist
  reviewers:
    - reviewer_id: development-codex-generalist
      provider: internal-agent
      role: generalist
    - reviewer_id: development-claude-generalist
      provider: claude-code
      role: generalist
    - reviewer_id: development-codex-adversarial-authority
      provider: internal-agent
      role: adversarial
      focus_zone: authority_boundary
      focus:
        - false readiness claims
        - human-owned decision boundaries
        - automatic gate versus human-mediated authority split
        - mock-vs-live evidence claims
        - P0/P1 collision-control bypass
  escalation_policy: Add more focused supplemental reviewers only after green evidence
    when validated risk, evidence gaps, or human decision require it; do not
    launch the target workflow's six-reviewer PR-readiness gate for this
    development run by default.

target_workflow_review_model:
  topology: heterogeneous-variable
  composition: provider-mirrored-topic-pairs
  topic_pairs:
    - topic: verification-evidence
      role: verification
      providers:
        - internal-agent
        - claude-code
    - topic: architecture-process
      role: architecture
      providers:
        - internal-agent
        - claude-code
    - topic: adversarial-authority
      role: adversarial
      providers:
        - internal-agent
        - claude-code

artifact_roles:
  methodology_source:
    - docs/
    - workflows/
    - schemas/
    - templates/
    - scripts/
  project_overlay:
    - .agentsflow/
  run_artifact:
    - run-artifacts/agentsflow/runs/2026-06-21-pr-merge-readiness/
  generated_evidence:
    - run-artifacts/agentsflow/runs/2026-06-21-pr-merge-readiness/evidence/

phase_status:
  - phase: operating_context_preflight
    status: completed
    output_refs:
      - human-decisions.yaml
    notes:
      - Self-application storage policy accepted by human before run start.
      - "`.agentsflow/` is gitignored and used only as local project overlay."
      - "Self-application uses `run-artifacts/agentsflow/runs/` to avoid `Docs/` and `docs/` collapse on case-insensitive filesystems."
  - phase: contract
    status: completed
    notes:
      - Draft contract and behavior bindings accepted for impact mapping and technical planning.
      - Target workflow review model updated to heterogeneous provider-mirrored topic pairs before planning.
      - Development-run review gate is separate and remains proportional under BFCF.
  - phase: impact
    status: completed
    output_refs:
      - impact-map.yaml
  - phase: technical_plan
    status: completed
    output_refs:
      - repository-grounding-report.md
      - plan.md
      - task-breakdown.md
      - decision-contract.md
  - phase: plan_gate
    status: completed
    output_refs:
      - plan-gate-report.md
      - plan-gate-report.json
  - phase: contract_acceptance
    status: completed
    notes:
      - Human acceptance is required before red-capture.
      - Human approved minimal BFCF contract_acceptance hardening before continuing the design review.
      - Targeted red/green evidence for that methodology hardening is recorded in human-decisions.yaml.
      - Human accepted DDR-001 through DDR-010 for red-capture.
      - Implementation has not started.
  - phase: red_capture
    status: completed
    output_refs:
      - red-capture-report.md
    notes:
      - Red-capture failed as expected before implementation.
      - "Command: `.venv/bin/python -m pytest tests/test_pr_merge_readiness.py -q`."
      - Missing implementation captured for repo_validation.pr_merge_readiness, workflow manifest and example report.
      - Implementation may now begin within the accepted slice boundaries.
  - phase: implementation
    status: completed
    notes:
      - Implemented the accepted pr-merge-readiness workflow/schema/template/example/docs/validator slice.
      - No PR mutation, release runtime, generic CI provider abstraction or external reviewer provider rewrite was added.
      - Development-review blocker fix applied after live Claude invocation showed `permission_mode: plan` does not reliably return schema-bound reviewer JSON to the wrapper.
  - phase: verification_gate
    status: completed
    output_refs:
      - verification-gate-report.md
      - evidence-report.md
    notes:
      - Targeted tests, repo validation, full pytest, make check, mock external reviewer smoke and diff whitespace checks passed.
      - Post-review blocker-fix verification passed with 20 targeted PRM tests, 169 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check.
      - Second blocker-fix verification passed with 27 targeted PRM tests, 176 full pytest tests and repository validation after adding required review topology, reviewer-report source finding intake, Claude invocation binding and structured collision-control report checks.
      - Fourth blocker-fix verification passed with 35 targeted PRM tests, 3 review-set runner/preparation targeted tests, 184 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after tightening target topology, final merge human-decision binding, source finding reviewer identity, Claude artifact hash binding, collision-control report relevance, prepared packet schema validity and external-reviewer/internal-wait progress heartbeat output.
      - Fifth blocker-fix verification passed with 38 targeted PRM tests, 8 selected review-set/preparation/invocation-evidence tests, 188 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after adding review-role binding, run-artifacts validation coverage, collision-control prompt-contract provenance, predeclared invocation-set evidence and forbidden-action packet normalization.
      - Sixth blocker-fix verification passed with 48 targeted PRM tests, 151 reviewer/tooling smoke tests, 199 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after fixing evaluator false-readiness paths, live Claude guardrail proof, internal model-family matching, rubric hash binding, stale embedded packet snapshot detection and internal reviewer report review-context binding.
      - Seventh blocker-fix verification passed with 50 targeted PRM tests, 151 reviewer/tooling smoke tests, 201 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after tightening internal reviewer report context binding for run_id and reviewer_instance_id.
      - Eighth blocker-fix verification passed with 51 targeted PRM tests, 151 reviewer/tooling smoke tests, 202 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after anchoring pr-merge-readiness review packets to the evaluated report run_id and material_change_id.
      - Ninth blocker-fix verification passed with 62 targeted PRM tests, 152 reviewer/tooling smoke tests, 214 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after closing raw-output policy, provider-config validation and review-set skip-raw integration blockers.
      - Tenth blocker-fix verification passed with 65 targeted PRM tests, 152 reviewer/tooling smoke tests, 217 full pytest tests, repository validation, make check, mock external reviewer smoke and diff whitespace check after closing normalization raw-source bypasses, binding human merge approval to material/report hash and cleaning redacted raw-output examples.
  - phase: development_review
    status: rerun_required
    notes:
      - Prior development review attempts found valid P1 blockers and are stale after material source changes.
      - The live review-set runner started before these fixes was stopped so it would not write fresh-looking evidence for an obsolete packet.
      - Next development review must regenerate review packets/prompts and run the accepted three-reviewer gate again: external Claude generalist first, then internal Codex generalist and Codex adversarial-authority specialist.

