name: review-only-fusion
version: 0.1
intent: Run independent review and fusion on an existing spec, diff, contract, or
  architecture.
default_strictness: L3
entry_criteria:
- Artifact already exists; the task is review rather than implementation.
outputs:
- review reports
- fusion report
- finding validation report
- review cycle report
- blocking/non-blocking issues
uses:
  skills:
  - evidence-reporting
  - reviewer-generalist
  - reviewer-architecture
  - reviewer-verification
  - reviewer-adversarial
  - fusion-synthesis
  scripts:
  - evidence_validate
  templates:
  - reviewer-report.md
  - fusion-report.md
  - finding-validation-report.md
  - review-cycle-report.md
  packs:
  - agentic-system
  - coding-agent
  - backend-service
supported_profiles:
  strictness:
  - L2
  - L3
  - L4
  review_topologies:
  - homogeneous-dual
  - homogeneous-plus-focused
  - heterogeneous-variable
review:
  topology: homogeneous-dual
  composition: homogeneous
  control_policy: standard-review-control
  reviewers:
  - generalist-a
  - generalist-b
  prompt_policy:
    same_prompt: true
    same_packet: true
    same_rubric: true
    same_output_schema: true
  context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
    - review_packet
    - referenced_artifacts
  gates:
  - evidence_gate
  fusion_required: true
phases:
- name: evidence-availability-gate
  purpose: Validate that required evidence exists before independent reviewers run.
  skills:
  - evidence-reporting
  scripts:
  - evidence_validate
  outputs:
  - evidence gate report
  id: evidence_gate
  kind: verification
  actor_class: verification_gate
  owns_evidence_production: true
  gate: evidence_gate
- name: independent-review
  purpose: Run reviewers independently.
  runs_after:
  - evidence_gate
  skills:
  - reviewer-generalist
  scripts: []
  outputs:
  - review reports
  id: independent_review
  kind: review
- name: fusion
  purpose: Synthesize agreement/disagreement/blockers.
  runs_after:
  - independent_review
  skills:
  - fusion-synthesis
  scripts: []
  outputs:
  - fusion report
  id: fusion
  kind: fusion
- name: finding-validation
  purpose: Validate reviewer and fusion candidate findings against the reviewed
    artifact, evidence gate output, accepted decisions, scope and non-goals.
  runs_after:
  - fusion
  outputs:
  - finding validation report
  - review cycle report
  id: finding_validation
  kind: finding_validation
exit_criteria:
- Required artifacts are produced.
- Required scripts pass or skipped items are explicitly justified.
- Evidence is sufficient for the effective strictness.
- Fusion candidate blockers were relevance-validated before final decision support.
review_cycle:
  policy: standard-review-control
  default_exit_when: no_validated_blockers_or_mandatory_evidence_gaps
  max_review_cycles_required: false
  max_review_cycles_source: project_policy_or_workflow_binding
  max_review_cycles_absent_means: unlimited
  materiality_classification_source:
  - finding-validation-report.md
  - review-cycle-report.md
actor_model:
  planning:
    mode: human_guided
    coordinator: main-agent
    reserved_optional_actors:
    - planning-agent
  implementation_agent:
    status: reserved_future_actor
verification:
  gate_owns_evidence_production: true
  allowed_instrument_classes:
  - tests
  - deterministic_scripts
  - static_analysis
  - dynamic_analysis
  - debuggers
  - trace_analysis
  - log_analysis
  - network_traffic_analysis
  - profilers
  - fuzzers
  - benchmarks
  - security_scanners
  - domain_tools
mvp_status: v0.2-utility
binding_model:
  upstream_workflow_definition: true
  requires_project_binding_for_execution: true
  project_binding_artifact: .agentsflow/workflows/review-only-fusion.binding.yaml
  workflow_run_contains_task_artifacts: true
behavior_binding_policy:
  required_acceptance_scenarios_need_bindings: true
  canonical_artifact: '*.bindings.yaml'
  specification_only_scenarios_allowed: true
