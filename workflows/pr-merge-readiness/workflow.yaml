name: pr-merge-readiness
version: 0.1
intent: Evaluate whether a branch has enough already-produced verification,
  review, finding-validation and human-decision evidence to open, accept or
  merge as a pull request.
default_strictness: L1
entry_criteria:
- Branch, base branch and intended commit range are known.
- Verification, review and finding-validation evidence already exists or is
  explicitly marked missing/blocked.
- GitHub PR access is available when the run is expected to enter
  awaiting_human_decision.
- A human merge decision record exists when accepted merge-ready status is
  claimed.
outputs:
- pr-merge-readiness report
- GitHub PR summary-comment body and publication result evidence
- deterministic readiness evaluation result
uses:
  skills:
  - pr-merge-readiness
  scripts:
  - validate_repo
  templates:
  - pr-merge-readiness-report.json
  - human-decisions.yaml
  packs:
  - agentic-system
  - coding-agent
supported_profiles:
  strictness:
  - L1
  - L2
  - L3
  review_topologies: []
review:
  owns_review_execution: false
  consumes_review_evidence: true
  required_for_merge_ready: true
  default_evidence_mode: lite
  evidence_modes:
  - lite
  topology_source: source_workflow_or_project_binding
  provider_assignment_source: source_workflow_project_binding_or_review_gate_requirements
  required_when_claimed_by_report: true
phases:
- name: assemble-readiness-report
  id: assemble_readiness_report
  kind: reporting
  coordinator: main-agent
  purpose: >
    Use the pr-merge-readiness skill to assemble a branch-scoped readiness
    report from already-produced evidence. This phase does not run tests,
    launch reviewers, perform fusion or validate findings; required review-gate
    evidence is produced by the source workflow, project binding or an explicit
    review gate before merge-ready acceptance can pass.
  skills:
  - pr-merge-readiness
  outputs:
  - pr-merge-readiness-report.json
  - github-publication.md
  - github-publication-result.json
- name: readiness-gate
  id: readiness_gate
  kind: gate
  runs_after:
  - assemble_readiness_report
  gate: evidence_gate
  purpose: >
    Run the deterministic repository/readiness evaluator over the concrete
    report path and referenced artifacts. Invoke repository validation with
    `--pr-merge-readiness-report <path>` so the current run report is evaluated,
    not only curated repository fixtures. The evaluator computes accepted,
    awaiting-human, blocked or incomplete readiness states from recorded
    evidence only.
  scripts:
  - validate_repo
  outputs:
  - deterministic readiness evaluation result
exit_criteria:
- The readiness report validates against
  `schemas/pr-merge-readiness-report.schema.json`.
- The deterministic evaluator reports no blockers for accepted merge-ready
  status.
- Required review-gate evidence is present, fresh for the current material
  change, bound to the source workflow/project binding/explicit review-gate
  requirements artifact and validated by the deterministic evaluator.
- "Awaiting-human and accepted merge-ready states have published GitHub PR
  summary-comment evidence with `required_for_merge_readiness: true`."
- Accepted merge-ready status has a human merge decision bound to the current
  material change and exact readiness report hash.
- Missing evidence, stale review evidence and live-vs-mock external review gaps
  are reported as blockers or non-accepted states.
- Rejected or downgraded plausible blocker-path candidate findings have
  collision-control evidence.
review_control_rules:
  review_execution_owned_by: source_workflow_or_review_gate
  review_agents_read_only: true
  review_findings_are_candidate_findings: true
  main_agent_must_validate_finding_relevance: true
  unvalidated_findings_are_not_truth: true
  p0_p1_findings_must_not_be_silently_discarded: true
  missing_mandatory_evidence_blocks_acceptance: true
  p0_p1_findings_require_recorded_validation: true
actor_model:
  report_assembly:
    mode: main_agent_guided
    coordinator: main-agent
  implementation_agent:
    status: not_applicable
  review_execution:
    status: out_of_scope
verification:
  evaluator_owns_acceptance_computation: true
  allowed_instrument_classes:
  - deterministic_scripts
  - evidence_reference_validation
mvp_status: v0.2-utility
utility_shape: lightweight_gate_recipe
binding_model:
  upstream_workflow_definition: true
  requires_project_binding_for_execution: false
  workflow_run_contains_task_artifacts: false
behavior_binding_policy:
  required_acceptance_scenarios_need_bindings: false
  specification_only_scenarios_allowed: true
