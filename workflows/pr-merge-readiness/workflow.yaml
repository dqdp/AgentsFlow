name: pr-merge-readiness
version: 0.1
intent: Decide whether a branch has enough recorded evidence, review output and
  human approval to open, accept or merge as a pull request.
default_strictness: L3
entry_criteria:
- Branch, base branch and intended commit range are known.
- Verification and review evidence are available or explicitly marked blocked.
- A human merge decision will be recorded before accepted merge-ready status.
outputs:
- pr-merge-readiness report
- evidence summary
- review and fusion reports
- finding validation report
- human merge decision record
- optional GitHub publication evidence
uses:
  skills:
  - evidence-reporting
  - reviewer-generalist
  - reviewer-adversarial
  - fusion-synthesis
  scripts:
  - validate_repo
  - evidence_validate
  templates:
  - pr-merge-readiness-report.json
  - evidence-report.md
  - reviewer-report.md
  - fusion-report.md
  - finding-validation-report.md
  - human-decisions.yaml
  packs:
  - agentic-system
  - coding-agent
supported_profiles:
  strictness:
  - L2
  - L3
  - L4
  review_topologies:
  - homogeneous-dual
  - homogeneous-plus-focused
  - heterogeneous-variable
review:
  topology: homogeneous-plus-focused
  composition: homogeneous-plus-focused
  reviewers:
  - generalist-a
  - generalist-b
  - adversarial-codex
  prompt_policy:
    baseline_same_prompt: true
    baseline_same_packet: true
    baseline_same_rubric: true
    focused_reviewers_require_explicit_focus_zone: true
    focus_zones_may_overlap: true
    all_reviewers_must_report_p0_p1_outside_focus: true
    same_output_schema: true
  context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
    - review_packet
    - referenced_artifacts
  focus_zones:
  - reviewer: adversarial-codex
    role: adversarial
    primary_focus:
    - false readiness claims
    - missing human approval
    - mock-vs-live external review evidence
  gates:
  - verification_gate
  - evidence_gate
  - fusion_gate
  fusion_required: true
  blocking_policy:
    p0_blocks: true
    p1_blocks: true
    majority_cannot_override_blocker: true
    missing_evidence: blocked
phases:
- name: readiness-intake
  id: readiness_intake
  kind: specification
  mode: human_guided
  coordinator: main-agent
  purpose: Record branch, base branch, commit range, worktree state and required
    evidence policy.
  human_interaction:
    required: true
    question_artifact: human-questions.yaml
    decision_artifact: human-decisions.yaml
    required_decisions: []
  outputs:
  - readiness intake
- name: evidence-collection
  id: evidence_collection
  kind: reporting
  runs_after:
  - readiness_intake
  purpose: Collect deterministic check evidence and evidence references from the
    project-bound run.
  skills:
  - evidence-reporting
  scripts:
  - validate_repo
  - evidence_validate
  outputs:
  - evidence summary
  - command evidence paths
- name: evidence-gate
  id: evidence_gate
  kind: verification
  runs_after:
  - evidence_collection
  purpose: Validate that required evidence artifacts exist before independent
    reviewers are used as gate evidence.
  gate: evidence_gate
  skills:
  - evidence-reporting
  scripts:
  - evidence_validate
  outputs:
  - evidence gate report
- name: review
  id: review
  kind: review
  runs_after:
  - evidence_gate
  purpose: Run the selected readiness review topology over the same readiness
    packet and output schema.
  skills:
  - reviewer-generalist
  - reviewer-adversarial
  scripts: []
  outputs:
  - reviewer reports
  default_permissions:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
- name: fusion
  id: fusion
  kind: fusion
  runs_after:
  - review
  purpose: Synthesize reviewer agreement, disagreement and candidate blockers
    without majority-voting away P0/P1 findings.
  skills:
  - fusion-synthesis
  scripts: []
  outputs:
  - fusion report
  actor_class: fusion_agent
  role: read_only_synthesis
  may_launch_reviewers: false
  may_run_gates: false
  may_request_additional_review: true
- name: finding-validation
  id: finding_validation
  kind: finding_validation
  runs_after:
  - fusion
  purpose: Validate reviewer and fusion candidate findings against scope,
    evidence, accepted decisions and collision-control rules.
  outputs:
  - finding validation report
  - review cycle report
- name: readiness-report
  id: readiness_report
  kind: reporting
  runs_after:
  - finding_validation
  purpose: Produce the final branch-scoped readiness report from validated
    evidence, review output and human publication policy. Final merge acceptance
    is computed later from the hash-bound human decision record, not from
    self-asserted report status.
  skills:
  - evidence-reporting
  outputs:
  - pr-merge-readiness-report.json
- name: final-human-merge-decision
  id: final_human_merge_decision
  kind: decision
  runs_after:
  - readiness_report
  mode: human_guided
  coordinator: main-agent
  purpose: Record the final human acceptance, rejection or deferral bound to the
    exact `pr-merge-readiness-report.json` hash before any optional GitHub
    publication action runs.
  human_interaction:
    required: true
    question_artifact: human-questions.yaml
    decision_artifact: human-decisions.yaml
    required_decisions:
    - merge.acceptance
  outputs:
  - final hash-bound human merge decision record
- name: final-readiness-gate
  id: final_readiness_gate
  kind: gate
  runs_after:
  - final_human_merge_decision
  gate: evidence_gate
  purpose: Validate the final readiness report after the final hash-bound human
    merge decision is recorded.
  scripts:
  - validate_repo
  outputs:
  - final readiness gate evidence
- name: optional-github-publication
  id: optional_github_publication
  kind: reporting
  runs_after:
  - final_readiness_gate
  mode: automated
  coordinator: main-agent
  purpose: >
    When explicitly requested, publish the accepted readiness summary to the
    GitHub PR and record publication result evidence with a URL. Skipping,
    deferring or failing publication does not change local merge readiness.
  condition: publication requested
  optional: true
  required_for_merge_readiness: false
  default_publication:
    mode: summary_comment
    target: pull_request
    tool: gh
    action: pr comment
    execution:
      sandbox_mode: require_escalated
      reason: GitHub CLI authentication may depend on the local keychain/token
        context; default sandbox execution can produce false 401/403 evidence.
    body_artifact: github-publication.md
    result_artifact: github-publication-result.json
    source_of_truth: local_run_artifacts
  tools:
  - gh pr comment
  outputs:
  - GitHub publication evidence or skipped/deferred decision
exit_criteria:
- Readiness report validates against `schemas/pr-merge-readiness-report.schema.json`.
- Accepted merge-ready status has recorded human merge approval bound to the
  current material change and exact readiness report hash.
- GitHub PR publication is optional. Omitted, skipped or deferred publication
  does not block accepted merge-ready status. If the report claims `published`,
  publication result evidence with a URL is required.
- Missing evidence, stale review evidence and live-vs-mock external review gaps
  are recorded as blockers or non-accepted states.
- Rejected or downgraded plausible blocker-path candidate findings have
  collision-control evidence.
review_control_rules:
  review_agents_read_only: true
  review_agents_run_after: evidence_gate
  review_agents_may_run_tests: false
  review_agents_may_modify_files: false
  review_findings_are_candidate_findings: true
  main_agent_must_validate_finding_relevance: true
  unvalidated_findings_are_not_truth: true
  p0_p1_findings_must_not_be_silently_discarded: true
  missing_verification_is_reported_as_finding: true
  candidate_blockers_must_be_validated: true
  default_exit_when_no_validated_blocking_findings: true
  missing_mandatory_evidence_blocks_acceptance: true
  p0_p1_findings_require_recorded_validation: true
  post_fix_materiality_classification_required: true
review_cycle:
  default_exit_when: no_validated_blocking_findings
  max_review_cycles_required: false
  max_review_cycles_source: project_policy_or_workflow_binding
  max_review_cycles_absent_means: unlimited
  rerun_review_on:
  - mandatory_evidence_added
  - accepted_blocker_fixed
  - material_artifact_change
  - verification_gate_materially_changed
  - human_requested
  do_not_rerun_on:
  - nonblocking_findings_with_non_material_fixes_only
  - duplicate_consolidation
  - irrelevant_findings_rejected_with_reason
  - fusion_rewording_only
  materiality_classification:
    required_after_review_fixes: true
    material_triggers_take_precedence_over_do_not_rerun: true
    material_if_changes:
    - selected_risk_surfaces_or_failure_path_matrix
    - review_packet_content
    - workflow_or_gate_policy
    - schema_or_validator
    - mandatory_evidence
    - verification_gate_output
    - examples_used_as_evidence
    non_material_if_only:
    - report_editorial_changes_only
    - duplicate_consolidation
    - non_source_of_truth_notes
  blocking_default:
    severities:
    - P0
    - P1
    missing_mandatory_evidence_blocks: true
    majority_cannot_override_candidate_blocker: true
  validation_required_for:
  - P0
  - P1
  - fusion_candidate_blockers
  - mandatory_evidence_gaps
  final_states:
  - pass
  - pass-with-notes
  - needs-changes
  - needs-verification-evidence
  - human-decision-required
  - blocked
actor_model:
  planning:
    mode: human_guided
    coordinator: main-agent
  implementation_agent:
    status: not_applicable
verification:
  gate_owns_evidence_production: true
  allowed_instrument_classes:
  - tests
  - deterministic_scripts
  - static_analysis
  - documentation_consistency
review_agent_permissions:
  default:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
  explicit_tool_exceptions_allowed: true
  tool_exception_rule: Must be declared in workflow, reviewer manifest, or prompt;
    observations remain candidate findings.
fusion:
  role: read_only_synthesis
  may_launch_reviewers: false
  may_run_gates: false
  may_request_additional_review: true
mvp_status: v0.2-utility
binding_model:
  upstream_workflow_definition: true
  requires_project_binding_for_execution: true
  project_binding_artifact: .agentsflow/workflows/pr-merge-readiness.binding.yaml
  workflow_run_contains_task_artifacts: true
behavior_binding_policy:
  required_acceptance_scenarios_need_bindings: true
  canonical_artifact: '*.bindings.yaml'
  specification_only_scenarios_allowed: true
