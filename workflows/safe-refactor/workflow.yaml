name: safe-refactor
version: 0.1
intent: Perform a scoped refactor while preserving behavior and preventing unrelated
  changes.
default_strictness: L2
entry_criteria:
- Behavior should remain stable; structural change is desired.
outputs:
- refactor contract
- boundary check
- impact map
- regression evidence
uses:
  skills:
  - contract-authoring
  - impact-map-builder
  - adr-consistency-check
  - evidence-reporting
  - reviewer-verification
  scripts:
  - contract_lint
  - boundary_check
  - impact_map_check
  - evidence_validate
  templates:
  - task.contract.md
  - impact-map.yaml
  - evidence-report.md
  packs:
  - agentic-system
  - coding-agent
  - backend-service
supported_profiles:
  strictness:
  - L1
  - L2
  - L3
  review_topologies:
  - none
  - homogeneous-dual
  - homogeneous-plus-focused
phases:
- name: scope
  purpose: Define refactor scope and non-goals.
  skills:
  - contract-authoring
  scripts:
  - contract_lint
  outputs:
  - contract
  id: scope
  kind: specification
  mode: human_guided
  coordinator: main-agent
  reserved_optional_actors:
  - planning-agent
- name: impact
  purpose: Map required tests.
  skills:
  - impact-map-builder
  scripts:
  - impact_map_check
  outputs:
  - impact map
  id: impact
  kind: specification
  mode: human_guided
  coordinator: main-agent
  reserved_optional_actors:
  - planning-agent
- name: refactor-baseline-capture
  purpose: Run behavior-preservation checks before the refactor and capture the
    baseline result required for comparison.
  skills:
  - evidence-reporting
  scripts:
  - impact_map_check
  - evidence_validate
  outputs:
  - baseline capture gate report
  - pre-refactor evidence
  id: refactor_baseline_capture
  kind: verification
  gate: verification_gate
  test_framing: baseline_capture
  owns_evidence_production: true
- name: change
  purpose: Apply refactor within boundaries.
  skills: []
  scripts:
  - boundary_check
  outputs:
  - diff
  id: change
  kind: implementation
  change_type: refactor
- name: refactor-green-verify
  purpose: Re-run the same behavior-preservation checks after the refactor.
  skills:
  - evidence-reporting
  scripts:
  - boundary_check
  - impact_map_check
  - evidence_validate
  outputs:
  - green verification gate report
  - post-refactor evidence
  id: refactor_green_verify
  kind: verification
  gate: verification_gate
  test_framing: green_verify
  owns_evidence_production: true
- name: evidence
  purpose: Prove behavior preservation.
  skills:
  - evidence-reporting
  - reviewer-verification
  scripts:
  - evidence_validate
  outputs:
  - evidence report
  id: evidence
  kind: reporting
exit_criteria:
- Required artifacts are produced.
- Required scripts pass or skipped items are explicitly justified.
- Evidence is sufficient for the effective strictness.
review_control_rules:
  review_agents_read_only: true
  review_agents_run_after: verification_gate
  review_agents_may_run_tests: false
  review_agents_may_modify_files: false
  review_findings_are_candidate_findings: true
  main_agent_must_validate_finding_relevance: true
  unvalidated_findings_are_not_truth: true
  p0_p1_findings_must_not_be_silently_discarded: true
  missing_verification_is_reported_as_finding: true
  candidate_blockers_must_be_validated: true
  default_exit_when_no_validated_blocking_findings: true
  missing_mandatory_evidence_blocks_acceptance: true
  p0_p1_findings_require_recorded_validation: true
review_cycle:
  default_exit_when: no_validated_blocking_findings
  max_review_cycles_required: false
  max_review_cycles_source: project_policy_or_workflow_binding
  max_review_cycles_absent_means: unlimited
  rerun_review_on:
  - accepted_blocker_fixed
  - mandatory_evidence_added
  - contract_changed
  - material_artifact_change
  - verification_gate_materially_changed
  - human_requested
  do_not_rerun_on:
  - nonblocking_findings_with_non_material_fixes_only
  - duplicate_consolidation
  - irrelevant_findings_rejected_with_reason
  - fusion_rewording_only
  blocking_default:
    severities:
    - P0
    - P1
    missing_mandatory_evidence_blocks: true
    majority_cannot_override_candidate_blocker: true
  validation_required_for:
  - P0
  - P1
  - fusion_candidate_blockers
  - mandatory_evidence_gaps
  final_states:
  - pass
  - pass-with-notes
  - needs-changes
  - needs-verification-evidence
  - human-decision-required
  - blocked
actor_model:
  planning:
    mode: human_guided
    coordinator: main-agent
    reserved_optional_actors:
    - planning-agent
  implementation_agent:
    status: reserved_future_actor
verification:
  gate_owns_evidence_production: true
  allowed_instrument_classes:
  - tests
  - deterministic_scripts
  - static_analysis
  - dynamic_analysis
  - debuggers
  - trace_analysis
  - log_analysis
  - network_traffic_analysis
  - profilers
  - fuzzers
  - benchmarks
  - security_scanners
  - domain_tools
review_agent_permissions:
  default:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
  explicit_tool_exceptions_allowed: true
  tool_exception_rule: Must be declared in workflow, reviewer manifest, or prompt;
    observations remain candidate findings.
fusion:
  role: read_only_synthesis
  may_launch_reviewers: false
  may_run_gates: false
  may_request_additional_review: true
mvp_status: post-v0.2-reference
binding_model:
  upstream_workflow_definition: true
  requires_project_binding_for_execution: true
  project_binding_artifact: .agentsflow/workflows/safe-refactor.binding.yaml
  workflow_run_contains_task_artifacts: true
behavior_binding_policy:
  required_acceptance_scenarios_need_bindings: true
  canonical_artifact: '*.bindings.yaml'
  specification_only_scenarios_allowed: true
