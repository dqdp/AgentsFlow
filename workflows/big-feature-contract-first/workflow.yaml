name: big-feature-contract-first
version: 0.1
intent: Implement a large feature through contract, BDD scenarios, impact map, verification
  gates, and evidence.
entry_criteria:
- Feature is large enough to risk scope creep or architectural drift.
outputs:
- task contract
- BDD scenarios
- impact map
- implementation plan
- evidence report
- review/fusion reports when enabled
uses:
  skills:
  - contract-authoring
  - bdd-scenario-design
  - impact-map-builder
  - adr-consistency-check
  - evidence-reporting
  - reviewer-generalist
  - reviewer-architecture
  - reviewer-verification
  - reviewer-adversarial
  - fusion-synthesis
  scripts:
  - contract_lint
  - gherkin_lint
  - boundary_check
  - impact_map_check
  - evidence_validate
  templates:
  - task.contract.md
  - impact-map.yaml
  - evidence-report.md
  - reviewer-report.md
  - fusion-report.md
  packs:
  - agentic-system
  - coding-agent
  - backend-service
review:
  topology: homogeneous-plus-focused
  composition: homogeneous-plus-focused
  reviewers:
  - generalist-a
  - generalist-b
  - adversarial
  prompt_policy:
    baseline_same_prompt: true
    baseline_same_packet: true
    baseline_same_rubric: true
    focused_reviewers_require_explicit_focus_zone: true
    focus_zones_may_overlap: true
    all_reviewers_must_report_p0_p1_outside_focus: true
  focus_zones:
  - reviewer: adversarial
    role: adversarial
    primary_focus:
    - hidden failure modes
    - scope creep
    - false completion
  context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
    - review_packet
    - referenced_artifacts
  gates:
  - contract_gate
  - impact_gate
  - verification_gate
  - evidence_gate
  - fusion_gate
  fusion_required: true
  blocking_policy:
    p0_blocks: true
    p1_blocks: true
    majority_cannot_override_blocker: true
    missing_evidence: needs-additional-verification
supported_profiles:
  strictness:
  - L1
  - L2
  - L3
  - L4
  review_topologies:
  - homogeneous-dual
  - homogeneous-plus-focused
  - heterogeneous-variable
phases:
- name: contract
  purpose: Write/approve task contract.
  skills:
  - contract-authoring
  - bdd-scenario-design
  scripts:
  - contract_lint
  - gherkin_lint
  outputs:
  - task contract
  id: contract
  kind: specification
  mode: human_guided
  coordinator: main-agent
  reserved_optional_actors:
  - planning-agent
- name: impact
  purpose: Map changed areas to required checks.
  skills:
  - impact-map-builder
  - adr-consistency-check
  scripts:
  - impact_map_check
  outputs:
  - impact map
  id: impact
  kind: specification
  mode: human_guided
  coordinator: main-agent
  reserved_optional_actors:
  - planning-agent
- name: red-capture
  purpose: Turn contract scenarios into executable tests and run them against the
    not-yet-implemented state, capturing the expected failing result.
  skills:
  - evidence-reporting
  scripts:
  - impact_map_check
  - evidence_validate
  outputs:
  - red capture gate report
  - failing-run evidence
  id: red_capture
  kind: verification
  gate: verification_gate
  test_framing: red_capture
  owns_evidence_production: true
- name: implementation
  purpose: Implement within boundaries.
  skills: []
  scripts: []
  outputs:
  - diff
  id: implementation
  kind: implementation
- name: verification_gate
  purpose: Run required tests, deterministic checks, boundary checks, impact checks,
    and evidence validation.
  actor_class: verification_gate
  may_run_tests: true
  skills:
  - evidence-reporting
  scripts:
  - boundary_check
  - impact_map_check
  - evidence_validate
  outputs:
  - verification gate report
  - evidence bundle
  - evidence report
  id: verification_gate
  kind: verification
  test_framing: green_verify
  owns_evidence_production: true
  instruments:
  - type: tests
    source: workflow/profile
  - type: deterministic_scripts
    source: workflow scripts
  - type: static_analysis
    source: optional/profile
  - type: dynamic_analysis
    source: optional/profile
  - type: domain_tools
    source: optional/profile
  gate: verification_gate
- name: review
  purpose: Run read-only independent review after the verification gate.
  actor_class: review_agent
  runs_after:
  - verification_gate
  read_only: true
  may_run_tests: false
  may_modify_files: false
  skills:
  - reviewer-generalist
  - reviewer-adversarial
  - fusion-synthesis
  scripts: []
  outputs:
  - review/fusion reports
  id: review
  kind: review
  default_permissions:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
  explicit_tool_exceptions_allowed: true
exit_criteria:
- Required artifacts are produced.
- Required scripts pass or skipped items are explicitly justified.
- Verification gate produced a gate report/evidence bundle.
- Review agents ran after the verification gate and did not run tests/scripts themselves.
- Evidence is sufficient for the selected strictness profile.
review_control_rules:
  review_agents_read_only: true
  review_agents_run_after: verification_gate
  review_agents_may_run_tests: false
  review_agents_may_modify_files: false
  review_findings_are_candidate_findings: true
  main_agent_must_validate_finding_relevance: true
  unvalidated_findings_are_not_truth: true
  p0_p1_findings_must_not_be_silently_discarded: true
  missing_verification_is_reported_as_finding: true
  candidate_blockers_must_be_validated: true
  default_exit_when_no_validated_blocking_findings: true
  missing_mandatory_evidence_blocks_acceptance: true
  p0_p1_findings_require_recorded_validation: true
review_cycle:
  default_exit_when: no_validated_blocking_findings
  max_review_cycles_required: true
  max_review_cycles_source: project_policy_or_workflow_binding
  rerun_review_on:
  - accepted_blocker_fixed
  - mandatory_evidence_added
  - contract_changed
  - material_artifact_change
  - verification_gate_materially_changed
  - human_requested
  do_not_rerun_on:
  - nonblocking_findings_only
  - duplicate_consolidation
  - irrelevant_findings_rejected_with_reason
  - fusion_rewording_only
  blocking_default:
    severities:
    - P0
    - P1
    missing_mandatory_evidence_blocks: true
    majority_cannot_override_candidate_blocker: true
  validation_required_for:
  - P0
  - P1
  - fusion_candidate_blockers
  - mandatory_evidence_gaps
  final_states:
  - pass
  - pass-with-notes
  - needs-changes
  - needs-verification-evidence
  - human-decision-required
  - blocked
actor_model:
  planning:
    mode: human_guided
    coordinator: main-agent
    reserved_optional_actors:
    - planning-agent
  implementation_agent:
    status: reserved_future_actor
verification:
  gate_owns_evidence_production: true
  allowed_instrument_classes:
  - tests
  - deterministic_scripts
  - static_analysis
  - dynamic_analysis
  - debuggers
  - trace_analysis
  - log_analysis
  - network_traffic_analysis
  - profilers
  - fuzzers
  - benchmarks
  - security_scanners
  - domain_tools
review_agent_permissions:
  default:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
  explicit_tool_exceptions_allowed: true
  tool_exception_rule: Must be declared in workflow, reviewer manifest, or prompt;
    observations remain candidate findings.
fusion:
  role: read_only_synthesis
  may_launch_reviewers: false
  may_run_gates: false
  may_request_additional_review: true
concrete_gates:
- contract_gate
- evidence_gate
- fusion_gate
- impact_gate
- verification_gate
mvp_status: v0.2-mvp
binding_model:
  upstream_workflow_definition: true
  requires_project_binding_for_execution: true
  project_binding_artifact: .agentsflow/workflows/big-feature-contract-first.binding.yaml
  workflow_run_contains_task_artifacts: true
behavior_binding_policy:
  required_acceptance_scenarios_need_bindings: true
  canonical_artifact: '*.bindings.yaml'
  specification_only_scenarios_allowed: true
