name: big-feature-contract-first
version: 0.1
intent: Implement a large feature through contract, BDD scenarios, impact map, verification
  gates, and evidence.
default_strictness: L3
entry_criteria:
- Feature is large enough to risk scope creep or architectural drift.
outputs:
- task contract
- BDD scenarios
- impact map
- implementation plan
- evidence report
- human decision packet when blocking questions exist
- review/fusion reports when enabled
uses:
  skills:
  - contract-authoring
  - bdd-scenario-design
  - impact-map-builder
  - adr-consistency-check
  - evidence-reporting
  - reviewer-generalist
  - reviewer-architecture
  - reviewer-verification
  - reviewer-adversarial
  - fusion-synthesis
  scripts:
  - contract_lint
  - gherkin_lint
  - boundary_check
  - impact_map_check
  - evidence_validate
  templates:
  - task.contract.md
  - repository-grounding-report.md
  - plan.md
  - task-breakdown.md
  - decision-contract.md
  - impact-map.yaml
  - evidence-report.md
  - human-questions.yaml
  - human-decisions.yaml
  - reviewer-report.md
  - fusion-report.md
  - finding-validation-report.md
  - review-cycle-report.md
  packs:
  - agentic-system
  - coding-agent
  - backend-service
review:
  topology: homogeneous-plus-focused
  composition: homogeneous-plus-focused
  reviewers:
  - generalist-a
  - generalist-b
  - adversarial
  prompt_policy:
    baseline_same_prompt: true
    baseline_same_packet: true
    baseline_same_rubric: true
    focused_reviewers_require_explicit_focus_zone: true
    focus_zones_may_overlap: true
    all_reviewers_must_report_p0_p1_outside_focus: true
  focus_zones:
  - reviewer: adversarial
    role: adversarial
    primary_focus:
    - hidden failure modes
    - scope creep
    - false completion
  context_policy:
    start_mode: fresh_context
    fork_conversation_context: false
    allowed_context_sources:
    - review_packet
    - referenced_artifacts
  gates:
  - contract_gate
  - impact_gate
  - plan_gate
  - verification_gate
  - evidence_gate
  - fusion_gate
  fusion_required: true
  blocking_policy:
    p0_blocks: true
    p1_blocks: true
    majority_cannot_override_blocker: true
    missing_evidence: needs-additional-verification
human_interaction:
  mode: main-agent-mediated
  reviewers_may_ask_human: false
  pause_state: paused_waiting_for_human
  question_artifact: human-questions.yaml
  decision_artifact: human-decisions.yaml
  allowed_pause_phases:
  - operating_context_preflight
  - contract
  - finding_validation
  - final_decision
  pause_on:
  - unresolved_blocking_material_question
  - scope_or_contract_amendment
  - accepted_decision_or_adr_conflict
  - exhausted_review_cycles
  - final_human_acceptance_required_by_project_policy
operating_context_preflight:
  sufficient_context_required: true
  prior_project_initialization_required: false
  accepted_sources:
  - project-operating-decisions.yaml
  - workflow binding
  - task contract
  - explicit human decision packet
  blockers:
  - needs-project-binding
  - needs-verification-gate
  - needs-review-policy
  - needs-evidence-location
  - needs-red-capture-policy
  - needs-human-authority-decision
open_question_policy:
  classification_required: true
  classifications:
  - blocking-material
  - nonblocking-follow-up
  - nonblocking-known-limitation
  - out-of-scope
  default_behavior:
    blocking-material: pause_for_human
    nonblocking-follow-up: record_followup
    nonblocking-known-limitation: record_default_or_limitation
    out-of-scope: record_out_of_scope
  grouped_decision_packet_required: true
supported_profiles:
  strictness:
  - L1
  - L2
  - L3
  - L4
  review_topologies:
  - homogeneous-dual
  - homogeneous-plus-focused
  - heterogeneous-variable
phases:
- name: operating-context-preflight
  id: operating_context_preflight
  kind: planning
  mode: human_guided
  coordinator: main-agent
  purpose: Confirm sufficient operating context for the target workflow before
    contract drafting or implementation. The project may have completed
    project-initialization, may be partly initialized, or may have been developed
    with AgentsFlow from the start; missing required context is recorded as a
    concrete blocker.
  outputs:
  - task contract operating context preflight
  - human-questions.yaml when blocking questions exist
  - human-decisions.yaml when answers are provided
  human_interaction:
    can_pause: true
    required: conditional
    prompt_source: task.contract.md open questions
    question_artifact: human-questions.yaml
    decision_artifact: human-decisions.yaml
    response_artifact: task.contract.md
    allowed_resume_states:
    - answered
    - unresolved
- name: contract
  purpose: Write/approve task contract, including operating context preflight and
    classified open questions.
  skills:
  - contract-authoring
  - bdd-scenario-design
  scripts:
  - contract_lint
  - gherkin_lint
  outputs:
  - task.contract.md
  - grouped decision packet when needed
  id: contract
  kind: specification
  mode: human_guided
  coordinator: main-agent
  reserved_optional_actors:
  - planning-agent
  inputs:
  - operating context preflight
  human_interaction:
    can_pause: true
    required: conditional
    prompt_source: task.contract.md open questions
    question_artifact: human-questions.yaml
    decision_artifact: human-decisions.yaml
    response_artifact: task.contract.md
    allowed_resume_states:
    - answered
    - unresolved
- name: impact
  purpose: Map changed areas to required checks.
  skills:
  - impact-map-builder
  - adr-consistency-check
  scripts:
  - impact_map_check
  outputs:
  - impact map
  id: impact
  kind: specification
  mode: human_guided
  coordinator: main-agent
  reserved_optional_actors:
  - planning-agent
- name: technical-plan
  id: technical_plan
  kind: specification
  applies_to_strictness:
  - L3
  - L4
  purpose: Produce the grounded plan artifacts required when effective strictness
    includes the plan gate before red capture or implementation begins.
  runs_after:
  - impact
  skills:
  - contract-authoring
  - impact-map-builder
  scripts: []
  templates:
  - repository-grounding-report.md
  - plan.md
  - task-breakdown.md
  - decision-contract.md
  outputs:
  - repository-grounding-report.md
  - plan.md
  - task-breakdown.md
  - decision-contract.md
- name: plan-gate
  purpose: Validate that the implementation plan is grounded, scoped, testable
    and ready for implementation before red capture or code changes begin.
  skills:
  - evidence-reporting
  scripts: []
  outputs:
  - plan-gate-report.md
  - plan-gate-report.json
  id: plan_gate
  kind: gate
  gate: plan_gate
  runs_after:
  - technical_plan
  applies_to_strictness:
  - L3
  - L4
  owns_evidence_production: true
- name: red-capture
  purpose: Turn contract scenarios into executable tests and run them against the
    not-yet-implemented state, capturing the expected failing result.
  runs_after:
  - plan_gate
  runs_after_policy: after_applicable_strictness_gate
  skills:
  - evidence-reporting
  scripts:
  - impact_map_check
  - evidence_validate
  outputs:
  - red capture gate report
  - failing-run evidence
  id: red_capture
  kind: verification
  gate: verification_gate
  test_framing: red_capture
  owns_evidence_production: true
- name: implementation
  purpose: Implement within boundaries.
  skills: []
  scripts: []
  outputs:
  - diff
  id: implementation
  kind: implementation
- name: verification_gate
  purpose: Run required tests, deterministic checks, boundary checks, impact checks,
    and evidence validation.
  actor_class: verification_gate
  may_run_tests: true
  skills:
  - evidence-reporting
  scripts:
  - boundary_check
  - impact_map_check
  - evidence_validate
  outputs:
  - verification gate report
  - evidence bundle
  - evidence report
  id: verification_gate
  kind: verification
  test_framing: green_verify
  owns_evidence_production: true
  instruments:
  - type: tests
    source: workflow/profile
  - type: deterministic_scripts
    source: workflow scripts
  - type: static_analysis
    source: optional/profile
  - type: dynamic_analysis
    source: optional/profile
  - type: domain_tools
    source: optional/profile
  gate: verification_gate
- name: review
  purpose: Run read-only independent review after the verification gate.
  actor_class: review_agent
  runs_after:
  - verification_gate
  read_only: true
  may_run_tests: false
  may_modify_files: false
  skills:
  - reviewer-generalist
  - reviewer-adversarial
  scripts: []
  outputs:
  - reviewer reports
  id: review
  kind: review
  default_permissions:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
  explicit_tool_exceptions_allowed: true
- name: fusion
  id: fusion
  kind: fusion
  purpose: Synthesize candidate findings and preserve candidate blockers without
    treating reviewer majority as authoritative truth.
  skills:
  - fusion-synthesis
  scripts: []
  runs_after:
  - review
  outputs:
  - fusion-report.md
- name: finding-validation
  id: finding_validation
  kind: finding_validation
  purpose: Validate reviewer and fusion findings against the contract, diff,
    verification evidence, accepted decisions and scope; record blocker status
    and post-fix materiality classification before deciding whether another review
    cycle is required.
  runs_after:
  - fusion
  outputs:
  - finding-validation-report.md
  - review-cycle-report.md
  human_interaction:
    can_pause: true
    required: conditional
    prompt_source: finding-validation-report.md
    question_artifact: human-questions.yaml
    decision_artifact: human-decisions.yaml
    response_artifact: finding-validation-report.md
    allowed_resume_states:
    - answered
    - unresolved
- name: final-decision
  id: final_decision
  kind: decision
  purpose: Close the workflow when no validated blockers or mandatory evidence gaps
    remain, or pause for final human acceptance when project policy requires it.
  runs_after:
  - finding_validation
  outputs:
  - final decision summary
  human_interaction:
    can_pause: true
    required: conditional
    prompt_source: review-cycle-report.md
    question_artifact: human-questions.yaml
    decision_artifact: human-decisions.yaml
    response_artifact: final decision summary
    allowed_resume_states:
    - answered
    - defaulted
    - unresolved
exit_criteria:
- Required artifacts are produced.
- Operating context preflight completed, or unresolved blocking-material items
  are recorded as a workflow pause/blocker.
- Required scripts pass or skipped items are explicitly justified.
- Verification gate produced a gate report/evidence bundle.
- Review agents ran after the verification gate and did not run tests/scripts themselves.
- P0/P1 candidate findings were relevance-validated and no validated blockers or
  mandatory evidence gaps remain.
- Post-review fixes were classified as material or non-material before deciding
  whether to rerun review.
- Human final acceptance was recorded when required by project policy.
- Evidence is sufficient for the effective strictness.
review_control_rules:
  review_agents_read_only: true
  review_agents_run_after: verification_gate
  review_agents_may_run_tests: false
  review_agents_may_modify_files: false
  review_findings_are_candidate_findings: true
  main_agent_must_validate_finding_relevance: true
  unvalidated_findings_are_not_truth: true
  p0_p1_findings_must_not_be_silently_discarded: true
  missing_verification_is_reported_as_finding: true
  candidate_blockers_must_be_validated: true
  default_exit_when_no_validated_blocking_findings: true
  missing_mandatory_evidence_blocks_acceptance: true
  p0_p1_findings_require_recorded_validation: true
  post_fix_materiality_classification_required: true
review_cycle:
  default_exit_when: no_validated_blocking_findings
  max_review_cycles_required: false
  max_review_cycles_source: project_policy_or_workflow_binding
  max_review_cycles_absent_means: unlimited
  rerun_review_on:
  - accepted_blocker_fixed
  - mandatory_evidence_added
  - contract_changed
  - material_artifact_change
  - verification_gate_materially_changed
  - human_requested
  do_not_rerun_on:
  - nonblocking_findings_with_non_material_fixes_only
  - duplicate_consolidation
  - irrelevant_findings_rejected_with_reason
  - fusion_rewording_only
  materiality_classification:
    required_after_review_fixes: true
    material_triggers_take_precedence_over_do_not_rerun: true
    material_if_changes:
    - task_contract_or_scope
    - behavior_bindings
    - workflow_or_gate_policy
    - review_cycle_policy
    - schema_or_validator
    - project_overlay_or_binding
    - mandatory_evidence
    - verification_gate_output
    - examples_used_as_evidence
    non_material_if_only:
    - report_editorial_changes_only
    - duplicate_consolidation
    - non_source_of_truth_notes
  blocking_default:
    severities:
    - P0
    - P1
    missing_mandatory_evidence_blocks: true
    majority_cannot_override_candidate_blocker: true
  validation_required_for:
  - P0
  - P1
  - fusion_candidate_blockers
  - mandatory_evidence_gaps
  final_states:
  - pass
  - pass-with-notes
  - needs-changes
  - needs-verification-evidence
  - human-decision-required
  - blocked
actor_model:
  planning:
    mode: human_guided
    coordinator: main-agent
    reserved_optional_actors:
    - planning-agent
  implementation_agent:
    status: reserved_future_actor
verification:
  gate_owns_evidence_production: true
  allowed_instrument_classes:
  - tests
  - deterministic_scripts
  - static_analysis
  - dynamic_analysis
  - debuggers
  - trace_analysis
  - log_analysis
  - network_traffic_analysis
  - profilers
  - fuzzers
  - benchmarks
  - security_scanners
  - domain_tools
review_agent_permissions:
  default:
    read: true
    write: false
    run_tests: false
    run_verification_instruments: false
    run_tools: false
  explicit_tool_exceptions_allowed: true
  tool_exception_rule: Must be declared in workflow, reviewer manifest, or prompt;
    observations remain candidate findings.
fusion:
  role: read_only_synthesis
  may_launch_reviewers: false
  may_run_gates: false
  may_request_additional_review: true
concrete_gates:
- contract_gate
- evidence_gate
- fusion_gate
- impact_gate
- plan_gate
- verification_gate
mvp_status: v0.2-mvp
binding_model:
  upstream_workflow_definition: true
  requires_project_binding_for_execution: true
  project_binding_artifact: .agentsflow/workflows/big-feature-contract-first.binding.yaml
  workflow_run_contains_task_artifacts: true
behavior_binding_policy:
  required_acceptance_scenarios_need_bindings: true
  canonical_artifact: '*.bindings.yaml'
  specification_only_scenarios_allowed: true
